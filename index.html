<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Seis.8</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<meta name="theme-color" content="#0c0b09">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Seis.8">
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:#0c0b09;color:#ede8df;min-height:100dvh;overflow-x:hidden}

:root{
  --bg:#0c0b09;
  --bg2:#131109;
  --bg3:#1a1810;
  --bg4:#211f16;
  --border:#2c2919;
  --border2:#3a3626;
  --gold:#c9a040;
  --gold2:#e8c060;
  --gold-dim:rgba(201,160,64,.12);
  --gold-glow:rgba(201,160,64,.06);
  --text:#ede8df;
  --muted:#8a8270;
  --muted2:#4a4535;
  --red:#c94040;
  --red2:#e86060;
  --green:#52a87a;
  --blue:#5090c8;
  --shadow:0 8px 32px rgba(0,0,0,.6);
  --shadow-sm:0 2px 12px rgba(0,0,0,.4);
  --radius:14px;
  --radius-sm:8px;
}

/* ── NOISE TEXTURE OVERLAY ── */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.4;
}

/* ── LOGIN ── */
#loginScreen{
  min-height:100dvh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:40px 24px;
  position:relative;z-index:1;
  background:radial-gradient(ellipse 100% 60% at 50% -10%,rgba(201,160,64,.08) 0%,transparent 60%);
}
.login-ornament{
  width:90px;height:90px;border:1px solid var(--border2);border-radius:20px;
  display:flex;align-items:center;justify-content:center;margin:0 auto 24px;
  position:relative;background:var(--bg2);
  box-shadow:0 0 60px rgba(201,160,64,.1),inset 0 1px 0 rgba(255,255,255,.04);
}
.login-ornament::before{
  content:'';position:absolute;inset:-1px;border-radius:21px;
  background:linear-gradient(135deg,rgba(201,160,64,.4),transparent 50%,rgba(201,160,64,.1));
  z-index:-1;
}
.login-logo-text{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;color:var(--gold);letter-spacing:.1em}
.login-title{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;color:var(--text);letter-spacing:.08em;margin-bottom:4px;text-align:center}
.login-sub{font-size:10px;color:var(--muted);letter-spacing:.25em;text-transform:uppercase;margin-bottom:40px;text-align:center}
.login-form{width:100%;max-width:320px;display:flex;flex-direction:column;gap:12px}
.login-input{
  background:var(--bg2);border:1px solid var(--border2);color:var(--text);
  border-radius:var(--radius-sm);padding:14px 16px;font-size:14px;font-family:'DM Sans',sans-serif;
  width:100%;transition:border-color .2s,box-shadow .2s;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.3);
}
.login-input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,160,64,.08),inset 0 1px 3px rgba(0,0,0,.3)}
.login-input::placeholder{color:var(--muted2);font-size:13px}
.login-btn{
  background:linear-gradient(135deg,#c9a040,#a07828);
  color:#0c0b09;font-weight:700;font-size:13px;letter-spacing:.1em;text-transform:uppercase;
  border:none;border-radius:var(--radius-sm);padding:15px;cursor:pointer;margin-top:4px;
  transition:opacity .2s,transform .1s;
  box-shadow:0 4px 16px rgba(201,160,64,.25);
}
.login-btn:active{transform:scale(.98)}
#loginErr{color:var(--red2);font-size:12px;text-align:center;display:none;margin-top:2px}

/* ── HEADER ── */
#appHeader{
  position:sticky;top:0;z-index:200;
  background:rgba(12,11,9,.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px}
.header-brand{display:flex;align-items:center;gap:10px}
.header-mark{
  width:32px;height:32px;border:1px solid rgba(201,160,64,.3);border-radius:8px;
  display:flex;align-items:center;justify-content:center;background:var(--bg2);flex-shrink:0;
}
.header-mark span{font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:500;color:var(--gold);letter-spacing:.03em}
.header-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;color:var(--text);letter-spacing:.04em}
.header-user{display:flex;align-items:center;gap:10px}
.user-pill{
  background:var(--gold-dim);border:1px solid rgba(201,160,64,.2);
  border-radius:20px;padding:4px 12px;font-size:11px;font-weight:600;
  color:var(--gold);letter-spacing:.05em;text-transform:uppercase;
}
.logout-btn{font-size:11px;color:var(--muted);font-weight:500;background:none;border:none;cursor:pointer;padding:4px;letter-spacing:.03em;transition:color .2s}
.logout-btn:hover{color:var(--red2)}

/* ── NAV ── */
.nav-tabs{
  display:flex;padding:0 10px 10px;gap:2px;overflow-x:auto;scrollbar-width:none;
}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:8px 12px;border-radius:var(--radius-sm);cursor:pointer;
  color:var(--muted);font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  white-space:nowrap;transition:all .2s;flex-shrink:0;border:none;background:none;
  position:relative;
}
.nav-tab svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.6;transition:stroke .2s}
.nav-tab.active{color:var(--gold)}
.nav-tab.active svg{stroke:var(--gold)}
.nav-tab.active::after{
  content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);
  width:20px;height:2px;background:var(--gold);border-radius:1px;
}
#navAdm{display:none}

/* ── MAIN ── */
#mainApp{display:none;min-height:100dvh;position:relative;z-index:1}
#mainContent{padding:16px;max-width:520px;margin:0 auto}
.section{display:none}.section.active{display:block}

/* ── STAT CARDS ── */
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-box{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;position:relative;overflow:hidden;
}
.stat-box::after{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,160,64,.15),transparent);
}
.stat-box.full{grid-column:1/-1}
.stat-lbl{font-size:9px;font-weight:600;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;color:var(--gold);letter-spacing:-.5px;line-height:1}
.stat-val.blue{color:var(--blue)}
.stat-val.green{color:var(--green)}
.stat-sub{font-size:11px;color:var(--muted);margin-top:6px}

/* ── SECTION HEADER ── */
.sec-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sec-title{font-size:9px;font-weight:600;color:var(--muted);letter-spacing:.15em;text-transform:uppercase}

/* ── EVENTO PILLS ── */
.evento-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:9px 14px;background:var(--gold-glow);
  border:1px solid rgba(201,160,64,.1);border-radius:var(--radius-sm);margin-bottom:6px;
}
.evento-name{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.03em}
.evento-total{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:500;color:var(--gold)}

/* ── LIST ITEMS ── */
.list-item{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;margin-bottom:8px;transition:border-color .2s;
  box-shadow:var(--shadow-sm);
}
.list-item:hover{border-color:var(--border2)}
.item-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.item-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:2px}
.item-sub{font-size:11px;color:var(--muted);letter-spacing:.02em}
.item-amount{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;color:var(--gold);flex-shrink:0}
.item-amount.warn{color:#d4904a}
.comprobante-link{font-size:11px;color:var(--blue);margin-top:6px;display:inline-block;letter-spacing:.02em}

/* ── BADGES ── */
.badge{
  display:inline-flex;align-items:center;font-size:9px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:20px;
}
.badge-pendiente{background:rgba(201,160,64,.1);color:var(--gold);border:1px solid rgba(201,160,64,.25)}
.badge-aprobado{background:rgba(80,144,200,.1);color:var(--blue);border:1px solid rgba(80,144,200,.25)}
.badge-pagado{background:rgba(82,168,122,.1);color:var(--green);border:1px solid rgba(82,168,122,.25)}
.badge-completada{background:rgba(82,168,122,.15);color:var(--green);border:1px solid rgba(82,168,122,.35)}
.badge-admin{background:rgba(201,160,64,.15);color:var(--gold2);border:1px solid rgba(201,160,64,.35)}
.badge-parcial{background:rgba(80,144,200,.1);color:var(--blue);border:1px solid rgba(80,144,200,.25)}

/* ── HIST ── */
.hist-label{
  font-size:9px;font-weight:600;color:var(--muted2);letter-spacing:.15em;text-transform:uppercase;
  margin:18px 0 10px;padding-bottom:8px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
}
.hist-label::before{content:'';flex:1;height:1px;background:var(--border)}

/* ── BUTTONS ── */
.btn-primary{
  background:linear-gradient(135deg,#c9a040,#a07828);
  color:#0c0b09;font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;
  border:none;border-radius:var(--radius-sm);padding:13px 16px;cursor:pointer;width:100%;
  transition:opacity .2s,transform .1s;box-shadow:0 4px 16px rgba(201,160,64,.2);
}
.btn-primary:active{transform:scale(.98)}
.btn-outline{
  background:transparent;color:var(--gold);font-weight:600;font-size:12px;letter-spacing:.04em;
  border:1px dashed rgba(201,160,64,.25);border-radius:var(--radius);padding:13px;
  cursor:pointer;width:100%;margin-bottom:14px;transition:all .2s;
}
.btn-outline:hover{background:var(--gold-dim);border-color:rgba(201,160,64,.4)}
.btn-action{
  background:var(--gold-dim);color:var(--gold);font-weight:600;font-size:12px;letter-spacing:.04em;
  border:1px solid rgba(201,160,64,.2);border-radius:var(--radius-sm);padding:10px;
  cursor:pointer;width:100%;margin-top:10px;transition:all .2s;
}
.btn-approve{
  background:rgba(80,144,200,.08);color:var(--blue);font-weight:600;font-size:12px;
  border:1px solid rgba(80,144,200,.2);border-radius:var(--radius-sm);padding:10px;
  cursor:pointer;width:100%;margin-top:10px;transition:all .2s;
}
.btn-green{
  background:rgba(82,168,122,.08);color:var(--green);font-weight:600;font-size:12px;
  border:1px solid rgba(82,168,122,.2);border-radius:var(--radius-sm);padding:10px;
  cursor:pointer;width:100%;margin-top:10px;transition:all .2s;
}
.btn-back{
  background:none;border:none;color:var(--muted);font-size:12px;font-weight:500;
  cursor:pointer;display:flex;align-items:center;gap:6px;margin-bottom:20px;padding:0;
  letter-spacing:.04em;transition:color .2s;
}
.btn-back:hover{color:var(--gold)}

/* ── ADMIN ── */
.admin-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm);
}
.admin-card-title{
  font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.15em;
  text-transform:uppercase;margin-bottom:14px;
}
.admin-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 0;border-bottom:1px solid var(--border);
}
.admin-row:last-child{border-bottom:none}
.user-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 14px;background:var(--bg3);border:1px solid var(--border2);
  border-radius:var(--radius-sm);margin-bottom:6px;cursor:pointer;transition:all .2s;
}
.user-item:hover{background:var(--bg4);border-color:rgba(201,160,64,.2)}
.user-name{font-size:13px;font-weight:600;color:var(--gold)}
.vac-item{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:8px}
.prov-item{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:14px;margin-bottom:8px}

/* ── MODAL ── */
#mod{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
#mod.open{display:flex}
.modal-box{
  background:var(--bg2);border:1px solid var(--border2);border-top:1px solid rgba(201,160,64,.15);
  border-radius:20px 20px 0 0;width:100%;max-width:480px;
  max-height:90dvh;overflow-y:auto;padding:20px 20px 48px;
  box-shadow:0 -8px 40px rgba(0,0,0,.6);
}
.modal-handle{width:32px;height:3px;background:var(--border2);border-radius:2px;margin:0 auto 20px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;color:var(--text);letter-spacing:.03em}
.modal-close{
  background:var(--bg3);border:1px solid var(--border2);color:var(--muted);
  font-size:14px;cursor:pointer;line-height:1;padding:6px 10px;border-radius:6px;
  transition:all .2s;
}
.modal-close:hover{color:var(--text);border-color:var(--border)}

/* ── FORM ── */
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.form-label{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.15em;text-transform:uppercase}
.form-input{
  background:var(--bg);border:1px solid var(--border2);color:var(--text);
  border-radius:var(--radius-sm);padding:12px 14px;font-size:14px;font-family:'DM Sans',sans-serif;
  width:100%;transition:border-color .2s,box-shadow .2s;
}
.form-input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,160,64,.07)}
.form-input::placeholder{color:var(--muted2);font-size:13px}
.form-select{
  background:var(--bg);border:1px solid var(--border2);color:var(--text);
  border-radius:var(--radius-sm);padding:12px 14px;font-size:14px;font-family:'DM Sans',sans-serif;width:100%;
}
.form-select:focus{outline:none;border-color:var(--gold)}
.days-preview{font-size:12px;color:var(--blue);min-height:16px;margin-top:2px}
.file-input{
  font-size:12px;color:var(--muted);background:var(--bg);
  border:1px dashed var(--border2);border-radius:var(--radius-sm);
  padding:12px;width:100%;cursor:pointer;transition:border-color .2s;
}
.file-input:hover{border-color:var(--gold)}
.empty{text-align:center;padding:36px 16px;color:var(--muted2);font-size:12px;letter-spacing:.04em}
.deuda-amount{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;color:#d4904a}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── PAGOS PARCIALES ── */
.pago-parcial{
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;
}
.pago-num{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.pago-fecha{font-size:12px;color:var(--text);margin-top:2px}
.pago-monto{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:400;color:var(--gold)}

/* ── CHECKBOX REPORTE ── */
.check-item{
  display:flex;align-items:center;gap:12px;padding:12px 14px;
  background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);
  margin-bottom:6px;cursor:pointer;transition:border-color .2s;
}
.check-item:hover{border-color:rgba(201,160,64,.2)}
.check-item input[type=checkbox]{width:15px;height:15px;accent-color:var(--gold)}
.check-item label{font-size:13px;color:var(--text);cursor:pointer;flex:1}

/* ── PROVEEDOR CARD ── */
.sol-item{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow-sm);
}
.sol-proveedor{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;color:var(--gold);margin-bottom:3px}
.sol-meta{font-size:11px;color:var(--muted);margin-bottom:6px;letter-spacing:.02em}
.progress-bar{height:3px;background:var(--border2);border-radius:2px;margin:10px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),rgba(82,168,122,.6));border-radius:2px;transition:width .4s}

/* ── ADMIN SUB-TABS ── */
.sub-tabs{display:flex;gap:6px;margin-bottom:18px;overflow-x:auto;scrollbar-width:none}
.sub-tabs::-webkit-scrollbar{display:none}
.sub-tab{
  font-size:10px;font-weight:600;padding:7px 14px;border-radius:6px;letter-spacing:.06em;
  border:1px solid var(--border2);color:var(--muted);cursor:pointer;white-space:nowrap;
  background:none;transition:all .2s;
}
.sub-tab.active{color:var(--gold);background:var(--gold-dim);border-color:rgba(201,160,64,.3)}

/* ── DIVIDER ── */
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent);margin:16px 0}

/* ── SECTION INTRO ── */
.sec-intro{
  background:linear-gradient(135deg,var(--bg2),var(--bg3));
  border:1px solid var(--border);border-radius:var(--radius);
  padding:16px 18px;margin-bottom:16px;position:relative;overflow:hidden;
}
.sec-intro::before{
  content:'';position:absolute;top:0;right:0;width:80px;height:80px;
  background:radial-gradient(circle,rgba(201,160,64,.06),transparent 70%);
}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--bg4);border:1px solid var(--border2);border-radius:10px;
  padding:12px 20px;font-size:13px;color:var(--text);z-index:500;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;
  box-shadow:var(--shadow);white-space:nowrap;
}
#toast.show{transform:translateX(-50%) translateY(0)}

/* ── LOADING ── */
.loader{
  display:inline-block;width:18px;height:18px;
  border:2px solid var(--border2);border-top:2px solid var(--gold);
  border-radius:50%;animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay{
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:40px;color:var(--muted);font-size:12px;letter-spacing:.1em;text-transform:uppercase;
}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.animate-up{animation:fadeUp .35s ease-out forwards}
.section.active .list-item,.section.active .stat-box,.section.active .sol-item{animation:fadeUp .3s ease-out forwards}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-ornament">
    <span class="login-logo-text">6.8</span>
  </div>
  <p class="login-title">Seis.8</p>
  <p class="login-sub">Sistema Administrativo</p>
  <form id="loginForm" class="login-form">
    <input type="email" id="userInput" class="login-input" placeholder="Correo electrónico" required autocomplete="email">
    <input type="password" id="passInput" class="login-input" placeholder="Contraseña" required autocomplete="current-password">
    <p id="loginErr"></p>
    <button type="submit" class="login-btn">Ingresar</button>
  </form>

<script>
const API = 'https://script.google.com/macros/s/AKfycbxDBnYqKuUGirXBADXqvVM3gywD8ZCVcYfScmcaHsE-7w3GZ4gZlznQ1RFwMlQMOxCj/exec';
const TOK = 'seis8_token_2024';
const APP_VERSION = 'v4';

const $ = id => document.getElementById(id);
const fmt = n => new Intl.NumberFormat('es-MX',{style:'currency',currency:'MXN'}).format(n||0);
const fdt = d => d ? new Date(d).toLocaleDateString('es-MX',{day:'numeric',month:'short'}) : '—';
const bdg = s => `<span class="badge badge-${s}">${s}</span>`;

function toast(msg, duration=2800) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), duration);
}

let u = null;
let d = {viaticos:[],reembolsos:[],vacaciones:[],usuarios:{},solicitudes:[],pagos:[],proveedores:[]};
let selectedUser = null;
let admTab = 'general';
let EVENTOS = ['BALTIMORE','CONSTELACIONES','ANIVERSARIO FAAHORRO','POSADA FAAHORRO','GASTOS DE OFICINA','OTROS'];

// ─── API ──────────────────────────────────────────────────────────────────
async function api(act, params={}) {
  try {
    const datosStr = params.datos || '';
    const tieneArchivo = datosStr && (() => {
      try { return !!JSON.parse(datosStr).archivoBase64; } catch(e) { return false; }
    })();
    if (tieneArchivo) {
      const body = new URLSearchParams({accion:act,token:TOK,...params});
      const res = await fetch(API,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body.toString()});
      const text = await res.text();
      try { return JSON.parse(text); } catch(e) { return {error:text}; }
    }
    let url = `${API}?accion=${act}&token=${TOK}`;
    for (let k in params) url += `&${k}=${encodeURIComponent(params[k])}`;
    const res = await fetch(url);
    const text = await res.text();
    try { return JSON.parse(text); } catch(e) { return {error:text}; }
  } catch(e) { return {error:'Red: '+e.message}; }
}

// ─── UTILIDADES ──────────────────────────────────────────────────────────
function calcDias(fi,ff) {
  let dias=0, act=new Date(fi), fin=new Date(ff);
  if (fi>ff) return 0;
  while(act<=fin){ if(act.getDay()!==0) dias++; act.setDate(act.getDate()+1); }
  return dias;
}
function groupBy(arr,key) {
  return arr.reduce((a,i)=>{ const k=i[key]||'Sin dato'; if(!a[k]) a[k]={total:0,items:[]}; a[k].total+=(i.monto||0); a[k].items.push(i); return a; },{});
}
function fileToB64(file) {
  return new Promise(r=>{ const rd=new FileReader(); rd.onload=e=>r(e.target.result.split(',')[1]); rd.readAsDataURL(file); });
}

// ─── EVENTOS DROPDOWN ────────────────────────────────────────────────────
function eventoSelectHTML(name, required=true) {
  const opts = EVENTOS.map(e=>`<option value="${e}">${e}</option>`).join('');
  return `
    <select name="${name}" id="sel_${name}" class="form-select" ${required?'required':''} onchange="checkNuevoEvento('${name}')">
      <option value="">— Selecciona evento —</option>
      ${opts}
      <option value="__nuevo__">+ Agregar nuevo evento...</option>
    </select>
    <input type="text" id="new_${name}" class="form-input" placeholder="Nombre del evento (se guardará en MAYÚSCULAS)" style="display:none;margin-top:8px" oninput="this.value=this.value.toUpperCase()">
  `;
}
function checkNuevoEvento(name) {
  const sel = $(`sel_${name}`);
  const inp = $(`new_${name}`);
  if (sel.value==='__nuevo__') { inp.style.display='block'; inp.focus(); }
  else { inp.style.display='none'; }
}
async function resolveEvento(name) {
  const sel = $(`sel_${name}`);
  const inp = $(`new_${name}`);
  if (sel.value==='__nuevo__') {
    const nuevo = inp.value.toUpperCase().trim();
    if (!nuevo) return null;
    await api('crearEvento',{nombre:nuevo});
    if (!EVENTOS.includes(nuevo)) EVENTOS.push(nuevo);
    return nuevo;
  }
  return sel.value || null;
}
async function cargarEventos() {
  const res = await api('getEventos');
  if (res.ok && res.eventos) EVENTOS = res.eventos;
}

// ─── RENDER PRINCIPAL ────────────────────────────────────────────────────
function render() {
  if (!u) return;
  renderViaticos();
  renderReembolsos();
  renderVacaciones();
  renderProveedores();
  if (u.isAdmin) {
    if (admTab==='general') renderAdminGeneral();
    else if (admTab==='pagos') renderAdminPagos();
    else if (admTab==='reportes') renderAdminReportes();
  }
}

// ─── VIÁTICOS ────────────────────────────────────────────────────────────
function renderViaticos() {
  let lista = d.viaticos.filter(x=>x.uid===u.email);
  $('tVia').innerText = fmt(lista.reduce((s,x)=>s+(parseFloat(x.monto)||0),0));
  let g = groupBy(lista,'evento');
  $('viaEventos').innerHTML = Object.entries(g).map(([k,o])=>`
    <div class="evento-row"><span class="evento-name">${k}</span><span class="evento-total">${fmt(o.total)}</span></div>
  `).join('');
  $('lVia').innerHTML = lista.length ? lista.map(v=>`
    <div class="list-item">
      <div class="item-row">
        <div><div class="item-name">${v.concepto}</div><div class="item-sub">${v.evento||''} · ${fdt(v.fecha)}</div></div>
        <div class="item-amount">${fmt(v.monto)}</div>
      </div>
      ${v.foto?`<a href="${v.foto}" target="_blank" class="comprobante-link">↗ Ver comprobante</a>`:''}
    </div>
  `).join('') : '<div class="empty">Sin registros aún</div>';
}

// ─── REEMBOLSOS ──────────────────────────────────────────────────────────
function renderReembolsos() {
  let lista = d.reembolsos.filter(x=>x.uid===u.email);
  let pen = lista.filter(x=>x.estado==='pendiente');
  let hist = lista.filter(x=>x.estado==='pagado');
  $('tRee').innerText = fmt(pen.reduce((s,x)=>s+(parseFloat(x.monto)||0),0));
  $('lRee').innerHTML = pen.length ? pen.map(r=>`
    <div class="list-item">
      <div class="item-row">
        <div><div class="item-name">${r.concepto}</div><div class="item-sub">${r.evento||''} · ${fdt(r.fecha)}</div></div>
        <div style="text-align:right"><div class="item-amount warn">${fmt(r.monto)}</div><div style="margin-top:5px">${bdg(r.estado)}</div></div>
      </div>
      ${r.foto?`<a href="${r.foto}" target="_blank" class="comprobante-link">↗ Ver comprobante</a>`:''}
    </div>
  `).join('') : '<div class="empty">Sin pendientes</div>';
  $('lReeHist').innerHTML = hist.length ? `
    <div class="hist-label">Historial pagado</div>
    ${hist.map(r=>`
      <div class="list-item" style="opacity:.5">
        <div class="item-row">
          <div><div class="item-name">${r.concepto}</div><div class="item-sub">Pagado: ${fdt(r.fechaPago)}</div></div>
          <div class="item-amount" style="color:var(--green)">${fmt(r.monto)}</div>
        </div>
        ${r.foto?`<a href="${r.foto}" target="_blank" class="comprobante-link">↗ Ver comprobante</a>`:''}
      </div>
    `).join('')}
  ` : '';
}

// ─── VACACIONES ──────────────────────────────────────────────────────────
function renderVacaciones() {
  let lista = d.vacaciones.filter(x=>x.uid===u.email);
  let usados=0;
  lista.forEach(x=>{ if(x.estado==='aprobado') usados+=(parseInt(x.dias)||0); });
  const diasBase = (d.usuarios&&d.usuarios[u.email]&&d.usuarios[u.email].diasVac) ? parseInt(d.usuarios[u.email].diasVac) : 15;
  $('tVac').innerText = Math.max(0,diasBase-usados);
  let pendDias=0;
  lista.forEach(x=>{ if(x.estado==='pendiente') pendDias+=(parseInt(x.dias)||0); });
  $('vacPendientes').innerText = pendDias>0?`${pendDias} días en espera de aprobación`:'';
  $('lVac').innerHTML = lista.length ? lista.map(v=>`
    <div class="list-item">
      <div class="item-row">
        <div><div class="item-name">${v.dias} días hábiles</div><div class="item-sub">${fdt(v.fechaInicio)} → ${fdt(v.fechaFin)}</div></div>
        ${bdg(v.estado)}
      </div>
    </div>
  `).join('') : '<div class="empty">Sin solicitudes</div>';
}

// ─── PROVEEDORES (vista empleado) ────────────────────────────────────────
function renderProveedores() {
  let misSol = d.solicitudes.filter(x=>x.uid===u.email);
  let pendientes = misSol.filter(x=>x.estado==='pendiente');
  let montoPend = 0;
  pendientes.forEach(sol=>{
    const pagsSol = d.pagos.filter(p=>p.solicitudId===sol.id&&p.estado==='pendiente');
    pagsSol.forEach(p=>montoPend+=(parseFloat(p.monto)||0));
  });
  $('tProvPend').innerText = pendientes.length;
  $('tProvMonto').innerText = fmt(montoPend);

  if (!misSol.length) {
    $('lProv').innerHTML = '<div class="empty">Sin solicitudes de pago</div>';
    return;
  }

  $('lProv').innerHTML = misSol.map(sol=>{
    const pagsSol = d.pagos.filter(p=>p.solicitudId===sol.id);
    const pagados = pagsSol.filter(p=>p.estado==='pagado').length;
    const totalPags = pagsSol.length||1;
    const pct = Math.round((pagados/totalPags)*100);
    return `
      <div class="sol-item">
        <div class="sol-proveedor">${sol.proveedorNombre}</div>
        <div class="sol-meta">${sol.evento} · ${sol.concepto} · ${fdt(sol.fechaRequerida)}</div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <span style="font-size:11px;color:var(--muted)">${pagados}/${totalPags} pagos realizados</span>
          ${bdg(sol.estado)}
          <span style="font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--gold)">${fmt(sol.montoTotal)}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        ${sol.archivo?`<a href="${sol.archivo}" target="_blank" class="comprobante-link">↗ Ver cotización/factura</a>`:''}
        ${pagsSol.map(p=>`
          <div class="pago-parcial">
            <div><div class="pago-num">Pago ${p.numeroPago}</div><div class="pago-fecha">${fdt(p.fechaProgramada)}</div></div>
            <div style="text-align:right">
              <div class="pago-monto">${fmt(p.monto)}</div>
              ${p.estado==='pagado'?`<div>${bdg('pagado')} ${p.comprobante?`<a href="${p.comprobante}" target="_blank" class="comprobante-link">↗ Comprobante</a>`:''}</div>`:bdg('pendiente')}
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }).join('');
}

window.registrarPagoAdmin = async function(pagoId, solicitudId, monto) {
  const fc = $('fileComp');
  let datos = {pagoId, solicitudId, monto};
  if (fc && fc.files[0]) {
    const f = fc.files[0];
    datos.archivoBase64 = await fileToB64(f);
    datos.archivoNombre = f.name;
    datos.archivoTipo = f.type;

  const res = await api('registrarPago',{datos:JSON.stringify(datos), email:u.email});

window.renderReporteEvento = function() {
  const ev = $('selEventoRep').value;
  if (!ev) return;
  const sols = d.solicitudes.filter(s=>s.evento===ev);
  const pagsTodos = d.pagos;
  let totalMonto=0, totalPagado=0, totalPend=0;
  sols.forEach(sol=>{
    totalMonto += parseFloat(sol.montoTotal)||0;
    const pagsSol = pagsTodos.filter(p=>p.solicitudId===sol.id);
    pagsSol.forEach(p=>{
      if(p.estado==='pagado') totalPagado+=parseFloat(p.monto)||0;
      else totalPend+=parseFloat(p.monto)||0;
    });
  });
  $('reporteEvento').innerHTML = `
    <div class="stats-row" style="margin-top:14px">
      <div class="stat-box"><div class="stat-lbl">Total comprometido</div><div class="stat-val" style="font-size:22px">${fmt(totalMonto)}</div></div>
      <div class="stat-box"><div class="stat-lbl">Pagado</div><div class="stat-val green" style="font-size:22px">${fmt(totalPagado)}</div></div>
      <div class="stat-box full"><div class="stat-lbl">Por pagar</div><div class="stat-val" style="font-size:22px;color:#d4904a">${fmt(totalPend)}</div></div>
    </div>
    ${sols.map(sol=>{
      const pagsSol = pagsTodos.filter(p=>p.solicitudId===sol.id);
      const pagado = pagsSol.filter(p=>p.estado==='pagado').reduce((s,p)=>s+(parseFloat(p.monto)||0),0);
      return `
        <div class="admin-row">
          <div>
            <div style="font-size:13px;font-weight:500;color:var(--text)">${sol.proveedorNombre}</div>
            <div style="font-size:11px;color:var(--muted2)">${sol.concepto}</div>
          </div>
          <div style="text-align:right">
            <div style="font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--gold)">${fmt(sol.montoTotal)}</div>
            <div style="font-size:11px;color:var(--green)">Pagado: ${fmt(pagado)}</div>
          </div>
        </div>
      `;
    }).join('')}
  `;
};

window.descargarReporteBancario = function() {
  const checks = document.querySelectorAll('#checkProvs input[type=checkbox]:checked');
  if (!checks.length) { toast('Selecciona al menos un proveedor'); return; }
  const ids = Array.from(checks).map(c=>c.value);
  const provs = (d.proveedores||[]).filter(p=>ids.includes(p.id));
  let html = `<html><head><meta charset="UTF-8"><style>
    body{font-family:Arial,sans-serif;padding:40px;color:#222}
    h1{font-size:22px;margin-bottom:4px}
    .sub{font-size:13px;color:#888;margin-bottom:32px}
    table{width:100%;border-collapse:collapse}
    th{background:#c9a040;color:#fff;padding:10px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em}
    td{padding:10px;border-bottom:1px solid #eee;font-size:13px}
    tr:nth-child(even) td{background:#fafaf8}
    .footer{margin-top:32px;font-size:11px;color:#aaa}
  </style></head><body>
    <h1>Datos Bancarios de Proveedores</h1>
    <p class="sub">Seis.8 Integración · ${new Date().toLocaleDateString('es-MX',{day:'numeric',month:'long',year:'numeric'})}</p>
    <table>
      <thead><tr><th>Proveedor</th><th>Banco</th><th>CLABE</th><th>RFC</th><th>Teléfono</th></tr></thead>
      <tbody>
        ${provs.map(p=>`<tr><td><b>${p.nombre}</b></td><td>${p.banco||'—'}</td><td>${p.clabe||'—'}</td><td>${p.rfc||'—'}</td><td>${p.telefono||'—'}</td></tr>`).join('')}
      </tbody>
    </table>
    <p class="footer">Documento confidencial · Seis.8 Integración S.A. de C.V.</p>
  </body></html>`;
  const blob = new Blob([html],{type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'DatosBancarios_Seis8_'+new Date().toISOString().split('T')[0]+'.html';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('↓ Descargando reporte...');
};

async function load() {
  const res = await api(u.isAdmin?'getAdminDatos':'getDatos',{email:u.email});
  if (res.viaticos)    d.viaticos    = res.viaticos;
  if (res.reembolsos)  d.reembolsos  = res.reembolsos;
  if (res.vacaciones)  d.vacaciones  = res.vacaciones;
  if (res.usuarios)    d.usuarios    = res.usuarios;
  if (res.solicitudes) d.solicitudes = res.solicitudes;
  if (res.pagos)       d.pagos       = res.pagos;
  if (res.proveedores) d.proveedores = res.proveedores;
  if (!d.proveedores || !d.proveedores.length) {
    const rp = await api('getProveedores', {email: u.email});
    if (rp.ok && rp.proveedores) d.proveedores = rp.proveedores;
  }
  await cargarEventos();
  render();
}

         <select name="proveedorId" id="selProv" class="form-select" required>
           <option value="">— Selecciona proveedor —</option>
           ${provOpts}
         </select>
         <p style="font-size:11px;color:var(--muted);margin-top:5px">¿No está? <button type="button" onclick="openModal('prov')" style="background:none;border:none;color:var(--gold);font-size:11px;cursor:pointer;text-decoration:underline">Agregar proveedor nuevo</button></p>
       </div>
       <div class="form-group"><label class="form-label">Evento</label>${eventoSelectHTML('eventoSol')}</div>
       <div class="form-group"><label class="form-label">Concepto / Descripción</label><input name="concepto" class="form-input" placeholder="Descripción del servicio" required></div>
       <div class="form-group"><label class="form-label">Monto total</label><input type="number" name="montoTotal" step="0.01" class="form-input" placeholder="0.00" required id="inpMontoTotal" oninput="calcPagosParciales()"></div>
       <div class="form-group"><label class="form-label">Fecha requerida del primer pago</label><input type="date" name="fechaReq" class="form-input" required></div>
       <div class="form-group"><label class="form-label">Número de pagos</label>
         <select name="numPagos" class="form-select" onchange="calcPagosParciales()" id="selNumPagos">
           <option value="1">1 pago (total)</option>
           <option value="2">2 pagos</option>
           <option value="3">3 pagos</option>
           <option value="4">4 pagos</option>
           <option value="5">5 pagos</option>
         </select>
       </div>
       <div class="form-group" id="fgFrecuencia" style="display:none">
         <label class="form-label">Frecuencia de pagos</label>
         <select name="frecuencia" class="form-select" onchange="calcPagosParciales()" id="selFrecuencia">
           <option value="semanal">Semanal</option>
           <option value="quincenal">Quincenal</option>
           <option value="mensual">Mensual</option>
         </select>
       </div>
       <div id="prevPagos" style="margin-bottom:14px"></div>
       <div class="form-group"><label class="form-label">Cotización / Factura (opcional)</label><input type="file" id="fileSol" accept="image/*,application/pdf" class="file-input"></div>
       <button type="button" onclick="sv('sol',this.closest('.modal-box'))" class="btn-primary" style="margin-top:10px">Enviar Solicitud</button>`;
    setTimeout(()=>calcPagosParciales(),100);
  }
  $('mBod').innerHTML = h;
  $('mod').classList.add('open');
};

window.calcPagosParciales = function() {
  const numPagos = parseInt(document.querySelector('[name=numPagos]')?.value||'1');
  const monto = parseFloat(document.querySelector('[name=montoTotal]')?.value||0);
  const fgFre = $('fgFrecuencia');
  if (fgFre) fgFre.style.display = numPagos>1?'flex':'none';
  const prev = $('prevPagos');
  if (!prev) return;
  if (!monto || numPagos<=0) { prev.innerHTML=''; return; }
  const montoParcial = monto/numPagos;
  const frecuencia = document.querySelector('[name=frecuencia]')?.value||'mensual';
  const fechaBase = document.querySelector('[name=fechaReq]')?.value;
  let html = `<div style="font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px">Vista previa de pagos</div>`;
  for (let i=0;i<numPagos;i++) {
    let fecha = '—';
    if (fechaBase) {
      const d2 = new Date(fechaBase);
      if (frecuencia==='semanal') d2.setDate(d2.getDate()+(i*7));
      else if (frecuencia==='quincenal') d2.setDate(d2.getDate()+(i*15));
      else d2.setMonth(d2.getMonth()+i);
      fecha = d2.toLocaleDateString('es-MX',{day:'numeric',month:'short',year:'numeric'});
    }
    html += `<div class="pago-parcial"><div><div class="pago-num">Pago ${i+1}</div><div class="pago-fecha">${fecha}</div></div><div class="pago-monto">${fmt(montoParcial)}</div></div>`;
  }
  prev.innerHTML = html;
};

// ─── GUARDAR FORMULARIOS ─────────────────────────────────────────────────
window.sv = async function(t, box) {
  const getName = n => box.querySelector(`[name="${n}"]`)?.value||'';
  let o = {uid:u.email}, res;

  if (t==='via') {
    const evento = await resolveEvento('eventoVia');
    if (!evento) { alert('Selecciona un evento'); return; }
    o.fecha=getName('fecha'); o.evento=evento; o.concepto=getName('concepto');
    o.monto=parseFloat(getName('monto')); o.tipo='Gasto'; o.metodo='Efectivo';
    const fv=$('fileVia');
    if(fv&&fv.files[0]){ const f=fv.files[0]; o.archivoBase64=await fileToB64(f); o.archivoNombre=f.name; o.archivoTipo=f.type; }
    res=await api('guardarViatico',{datos:JSON.stringify(o)});
  }
  if (t==='ree') {
    const evento = await resolveEvento('eventoRee');
    if (!evento) { alert('Selecciona un evento'); return; }
    o.fecha=getName('fecha'); o.evento=evento; o.concepto=getName('concepto');
    o.monto=parseFloat(getName('monto')); o.tipoComp='Ticket'; o.estado='pendiente';
    const fr=$('fileRee');
    if(fr&&fr.files[0]){ const f=fr.files[0]; o.archivoBase64=await fileToB64(f); o.archivoNombre=f.name; o.archivoTipo=f.type; }
    res=await api('guardarReembolso',{datos:JSON.stringify(o)});
  }
  if (t==='vac') {
    o.fechaInicio=getName('fi'); o.fechaFin=getName('ff');
    o.dias=calcDias(o.fechaInicio,o.fechaFin); o.estado='pendiente';
    if(o.dias<=0){alert('Rango de fechas inválido');return;}
    res=await api('guardarVacacion',{datos:JSON.stringify(o)});
  }
  if (t==='usr') {
    o.nombre=getName('nombre'); o.email=getName('email');
    o.isAdmin=getName('rol')==='true'; o.diasVac=parseInt(getName('dias'))||15;
    res=await api('guardarUsuario',{datos:JSON.stringify(o),email:u.email});
  }
  if (t==='prov') {
    o.nombre=getName('nombre'); o.banco=getName('banco');
    o.clabe=getName('clabe'); o.rfc=getName('rfc'); o.telefono=getName('telefono');
    res=await api('guardarProveedor',{datos:JSON.stringify(o),email:u.email});
  }
  if (t==='sol') {
    const evento = await resolveEvento('eventoSol');
    if (!evento) { alert('Selecciona un evento'); return; }
    const selProv = box.querySelector('[name=proveedorId]');
    const provId = selProv?.value;
    const provNombre = selProv?.options[selProv.selectedIndex]?.dataset?.nombre||provId;
    if (!provId) { alert('Selecciona un proveedor'); return; }
    const numPagos = parseInt(getName('numPagos'));
    const montoTotal = parseFloat(getName('montoTotal'));
    const frecuencia = getName('frecuencia')||'mensual';
    const fechaReq = getName('fechaReq');
    const montoParcial = montoTotal/numPagos;
    const fechasPagos = [];
    for (let i=0;i<numPagos;i++) {
      const d2 = new Date(fechaReq);
      if (frecuencia==='semanal') d2.setDate(d2.getDate()+(i*7));
      else if (frecuencia==='quincenal') d2.setDate(d2.getDate()+(i*15));
      else d2.setMonth(d2.getMonth()+i);
      fechasPagos.push(d2.toISOString().split('T')[0]);
    }
    o.proveedorId=provId; o.proveedorNombre=provNombre;
    o.evento=evento; o.concepto=getName('concepto');
    o.montoTotal=montoTotal; o.fechaRequerida=fechaReq;
    o.numPagos=numPagos; o.frecuencia=frecuencia;
    o.fechasPagos=fechasPagos;
    const fs=$('fileSol');
    if(fs&&fs.files[0]){ const f=fs.files[0]; o.archivoBase64=await fileToB64(f); o.archivoNombre=f.name; o.archivoTipo=f.type; }
    res=await api('guardarSolicitud',{datos:JSON.stringify(o)});
  }

  if (res&&res.ok) { closeModal(); toast('✓ Guardado correctamente'); load(); }
  else alert('Error: '+(res?res.error:'Sin respuesta'));
};

// ─── LOGIN ────────────────────────────────────────────────────────────────
$('loginForm').onsubmit = async function(e) {
  e.preventDefault();
  const err=$('loginErr');
  err.style.display='none';
  const btn = this.querySelector('button');
  btn.textContent='...';
  const res = await api('login',{email:$('userInput').value});
  btn.textContent='Ingresar';
  if (res.ok) {
    const exp = res.usuario.nombre.toLowerCase().replace(/ /g,'')+('68');
    if ($('passInput').value.toLowerCase()===exp) {
      u = res.usuario;
      $('loginScreen').style.display='none';
      $('mainApp').style.display='block';
      $('uname').innerText = u.nombre;
      if (u.isAdmin) {
        $('navAdm').style.display='flex';
        $('navAdm').style.flexDirection='column';
        $('navAdm').style.alignItems='center';
      }
      load();
    } else { err.innerText='Contraseña incorrecta'; err.style.display='block'; }
  } else { err.innerText=res.error||'Error al iniciar sesión'; err.style.display='block'; }
};

document.querySelectorAll('.nav-tab').forEach(n=>n.onclick=function(){
  if(selectedUser&&this.dataset.s!=='sAdm'){ selectedUser=null; }
  document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));
  this.classList.add('active');
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  $(this.dataset.s).classList.add('active');
  $('htitle').innerText=this.dataset.t;
  render();
});

$('logout').onclick=()=>{
  u=null;
  d={viaticos:[],reembolsos:[],vacaciones:[],usuarios:{},solicitudes:[],pagos:[],proveedores:[]};
  location.reload();
};

<!-- SERVICE WORKER CON CACHE BUSTING AUTOMÁTICO -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      // Primero desregistrar todos los SW viejos
      const registrations = await navigator.serviceWorker.getRegistrations();
      for (const reg of registrations) {
        await reg.unregister();
      }
      // Registrar el nuevo
      await navigator.serviceWorker.register('sw.js?v=' + encodeURIComponent('APP_VERSION_SEIS8_V4'));
    } catch(e) {}
  });
}
</script>
