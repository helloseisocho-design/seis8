<body class="bg-bg text-fg">

    <!-- LOGIN -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-sm text-center">
            <div class="w-16 h-16 rounded-xl bg-accent flex items-center justify-center mx-auto mb-4 text-bg font-bold text-2xl">6.8</div>
            <h1 class="text-xl font-bold mb-6">Seis.8</h1>
            <form id="loginForm" class="space-y-4 text-left">
                <input type="email" id="userInput" placeholder="Correo electrónico" required class="w-full">
                <input type="password" id="passInput" placeholder="Contraseña" required class="w-full">
                <p id="err" class="text-danger text-sm text-center hidden"></p>
                <button class="w-full py-3 bg-accent text-bg font-bold rounded-lg">Entrar</button>
            </form>
        </div>
    </div>

    <!-- APP -->
    <div id="mainApp" class="hidden min-h-screen pb-20">
        <header class="sticky top-0 bg-bg border-b border-border p-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-accent flex items-center justify-center text-bg font-bold text-sm flex-shrink-0">6.8</div>
                <h2 id="htitle" class="font-bold text-sm">Viáticos</h2>
            </div>
            <div class="flex gap-2 items-center text-xs">
                <span id="uname" class="text-muted"></span>
                <button id="logout" class="text-danger font-bold">Salir</button>
            </div>
        </header>

        <main class="p-4">
            <!-- VIÁTICOS -->
            <section id="sVia" class="section active">
                <div class="card p-3 mb-3">
                    <p class="text-muted text-xs mb-1">Total General</p>
                    <b id="tVia" class="text-accent text-xl">$0</b>
                </div>
                <div id="viaEventos" class="space-y-1 mb-3 text-sm"></div>
                <button onclick="openModal('via')" class="w-full card p-2 mb-3 text-accent border-dashed border-2">+ Agregar</button>
                <div id="lVia" class="space-y-2"></div>
            </section>

            <!-- REEMBOLSOS -->
            <section id="sRee" class="section">
                <div class="card p-3 mb-3">
                    <p class="text-muted text-xs mb-1">Por Pagar</p>
                    <b id="tRee" class="text-warning text-xl">$0</b>
                </div>
                <button onclick="openModal('ree')" class="w-full card p-2 mb-3 text-warning border-dashed border-2">+ Agregar</button>
                <div id="lRee" class="space-y-2"></div>
                <div id="lReeHist" class="mt-4"></div>
            </section>

            <!-- VACACIONES -->
            <section id="sVac" class="section">
                <div class="card p-3 mb-3">
                    <p class="text-muted text-xs mb-1">Días Disponibles</p>
                    <b id="tVac" class="text-info text-xl">15</b>
                    <p id="vacPendientes" class="text-xs text-muted mt-1"></p>
                </div>
                <button onclick="openModal('vac')" class="w-full card p-2 mb-3 text-info border-dashed border-2">+ Solicitar</button>
                <div id="lVac" class="space-y-2"></div>
            </section>

            <!-- ADMIN -->
            <section id="sAdm" class="section">
                <div id="adminContent"></div>
            </section>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-card border-t border-border flex justify-around p-2">
            <b class="nav active" data-s="sVia">Via</b>
            <b class="nav" data-s="sRee">Ree</b>
            <b class="nav" data-s="sVac">Vac</b>
            <b id="navAdm" class="nav hidden" data-s="sAdm">Admin</b>
        </nav>
    </div>

    <!-- MODAL -->
    <div id="mod" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-4 z-50">
        <div class="card p-4 w-full max-w-sm max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between mb-3">
                <h3 id="mTit" class="font-bold"></h3>
                <button onclick="$('mod').classList.add('hidden')" class="text-muted">✕</button>
            </div>
            <div id="mBod"></div>
        </div>
    </div>

    <script>
    const API = 'https://script.google.com/macros/s/AKfycby5h9BDXmw4cN5I_Ep76tFHvxx0_Fet5fitCxxund6B0q7gbob7HNfK5iXBxuoVEvm7/exec';
    const TOK = 'seis8_token_2024';

    const $ = id => document.getElementById(id);
    const fmt = n => new Intl.NumberFormat('es-MX', {style:'currency', currency:'MXN'}).format(n);
    const fdt = d => d ? new Date(d).toLocaleDateString('es-MX', {day:'numeric', month:'short'}) : '-';
    const bdg = s => `<span class="badge badge-${s}">${s}</span>`;

    let u = null;
    let d = {viaticos:[], reembolsos:[], vacaciones:[], usuarios:{}};
    let selectedUser = null;

    // ─── API ─────────────────────────────────────────────────────────────────
    async function api(act, params) {
        try {
            const datosStr = params.datos || '';
            const tieneArchivo = datosStr && (() => {
                try { return !!JSON.parse(datosStr).archivoBase64; } catch(e) { return false; }
            })();

            if (tieneArchivo) {
                const body = new URLSearchParams({accion: act, token: TOK, ...params});
                const res = await fetch(API, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: body.toString()
                });
                const text = await res.text();
                try { return JSON.parse(text); } catch(e) { return {error: text}; }
            }

            let url = `${API}?accion=${act}&token=${TOK}`;
            for (let k in params) url += `&${k}=${encodeURIComponent(params[k])}`;
            const res = await fetch(url);
            const text = await res.text();
            try { return JSON.parse(text); } catch(e) { return {error: text}; }
        } catch(e) { return {error: 'Red: ' + e.message}; }
    }

    // ─── UTILIDADES ──────────────────────────────────────────────────────────
    function calcDias(fi, ff) {
        let dias = 0, act = new Date(fi), fin = new Date(ff);
        if (fi > ff) return 0;
        while (act <= fin) { if (act.getDay() !== 0) dias++; act.setDate(act.getDate() + 1); }
        return dias;
    }

    function groupBy(arr, key) {
        return arr.reduce((a, i) => {
            const k = i[key] || 'Sin dato';
            if (!a[k]) a[k] = {total:0, items:[]};
            a[k].total += (i.monto || 0);
            a[k].items.push(i);
            return a;
        }, {});
    }

    // ─── RENDER PRINCIPAL ────────────────────────────────────────────────────
    function render() {
        if (!u) return;
        renderViaticos();
        renderReembolsos();
        renderVacaciones();
        if (u.isAdmin) {
            selectedUser ? renderAdminDetail(selectedUser) : renderAdminGeneral();
        }
    }

    // ─── VIÁTICOS ────────────────────────────────────────────────────────────
    function renderViaticos() {
        let lista = d.viaticos.filter(x => x.uid === u.email);
        $('tVia').innerText = fmt(lista.reduce((s, x) => s + (x.monto || 0), 0));

        let g = groupBy(lista, 'evento');
        $('viaEventos').innerHTML = Object.entries(g).map(([k, o]) =>
            `<div class="flex justify-between p-1 bg-bg rounded text-xs"><span>${k}</span><b>${fmt(o.total)}</b></div>`
        ).join('');

        $('lVia').innerHTML = lista.length ? lista.map(v => `
            <div class="card p-2 text-sm">
                <div class="flex justify-between">
                    <b>${v.concepto}</b>
                    <b class="text-accent">${fmt(v.monto)}</b>
                </div>
                <p class="text-xs text-muted">${v.evento || ''} · ${fdt(v.fecha)}</p>
                ${v.foto ? `<a href="${v.foto}" target="_blank" class="text-xs text-info underline">Ver comprobante</a>` : ''}
            </div>
        `).join('') : '<p class="text-center text-muted text-xs p-2">Vacío</p>';
    }

    // ─── REEMBOLSOS ──────────────────────────────────────────────────────────
    function renderReembolsos() {
        let lista = d.reembolsos.filter(x => x.uid === u.email);
        let pen  = lista.filter(x => x.estado === 'pendiente');
        let hist = lista.filter(x => x.estado === 'pagado');

        $('tRee').innerText = fmt(pen.reduce((s, x) => s + (x.monto || 0), 0));

        $('lRee').innerHTML = pen.length ? pen.map(r => `
            <div class="card p-2 text-sm">
                <div class="flex justify-between">
                    <b>${r.concepto}</b>
                    <b class="text-warning">${fmt(r.monto)}</b>
                </div>
                <div class="flex justify-between items-center mt-1">
                    <span class="text-xs text-muted">${fdt(r.fecha)}</span>
                    ${bdg(r.estado)}
                </div>
                ${r.foto ? `<a href="${r.foto}" target="_blank" class="text-xs text-info underline">Ver comprobante</a>` : ''}
            </div>
        `).join('') : '<p class="text-center text-muted text-xs p-2">Sin pendientes</p>';

        $('lReeHist').innerHTML = hist.length ? `
            <p class="text-muted text-xs mb-1">Historial:</p>
            ${hist.map(r => `
                <div class="card p-2 text-sm opacity-60">
                    <div class="flex justify-between">
                        <b>${r.concepto}</b>
                        <b>${fmt(r.monto)}</b>
                    </div>
                    <p class="text-xs text-muted">Pagado: ${fdt(r.fechaPago)}</p>
                    ${r.foto ? `<a href="${r.foto}" target="_blank" class="text-xs text-info underline">Ver comprobante</a>` : ''}
                </div>
            `).join('')}
        ` : '';
    }

    // ─── VACACIONES ──────────────────────────────────────────────────────────
    function renderVacaciones() {
        let lista = d.vacaciones.filter(x => x.uid === u.email);

        let usados = 0;
        lista.forEach(x => { if (x.estado === 'aprobado') usados += (parseInt(x.dias) || 0); });

        const diasBase = (d.usuarios && d.usuarios[u.email] && d.usuarios[u.email].diasVac)
            ? parseInt(d.usuarios[u.email].diasVac)
            : 15;
        $('tVac').innerText = Math.max(0, diasBase - usados);

        let pendDias = 0;
        lista.forEach(x => { if (x.estado === 'pendiente') pendDias += (parseInt(x.dias) || 0); });
        $('vacPendientes').innerText = pendDias > 0 ? `${pendDias} días en espera de aprobación` : '';

        $('lVac').innerHTML = lista.length ? lista.map(v => `
            <div class="card p-2 text-sm">
                <div class="flex justify-between">
                    <b>${v.dias} días hábiles</b>
                    ${bdg(v.estado)}
                </div>
                <p class="text-xs text-muted">${fdt(v.fechaInicio)} → ${fdt(v.fechaFin)}</p>
            </div>
        `).join('') : '<p class="text-center text-muted text-xs p-2">Vacío</p>';
    }

    // ─── ADMIN GENERAL ───────────────────────────────────────────────────────
    function renderAdminGeneral() {
        $('adminContent').innerHTML = `
            <h3 class="font-bold mb-3 text-lg">Panel Admin</h3>

            <div class="card p-3 mb-3 border-l-4 border-purple-500">
                <div class="flex justify-between items-center mb-2">
                    <p class="font-bold text-sm">Usuarios</p>
                    <button onclick="openModal('usr')" class="text-xs text-purple-400 border border-purple-400/30 rounded px-2 py-1">+ Agregar</button>
                </div>
                <div id="admUsers" class="space-y-1 text-sm max-h-40 overflow-y-auto"></div>
            </div>

            <div class="card p-3 mb-3">
                <p class="text-muted text-xs mb-2">Deudas por Usuario (Reembolsos pendientes)</p>
                <div id="admDeudas" class="space-y-1 text-sm"></div>
            </div>

            <div class="card p-3 mb-3">
                <p class="text-muted text-xs mb-2">Gastos por Evento</p>
                <div id="admEventos" class="space-y-1 text-sm"></div>
            </div>

            <div class="card p-3">
                <p class="text-muted text-xs mb-2">Vacaciones pendientes por aprobar</p>
                <div id="lAdm" class="space-y-2"></div>
            </div>
        `;

        const users = d.usuarios || {};

        // Lista de usuarios
        $('admUsers').innerHTML = Object.entries(users).map(([id, obj]) => `
            <div onclick="selectUser('${id}')" class="flex justify-between items-center bg-bg p-2 rounded cursor-pointer hover:opacity-80">
                <span class="text-info underline">${obj.nombre}</span>
                <div class="flex items-center gap-2">
                    ${obj.isAdmin ? '<span class="badge badge-admin">Admin</span>' : ''}
                    <span class="text-xs text-muted">${obj.diasVac || 15} días</span>
                </div>
            </div>
        `).join('') || '<p class="text-xs text-muted">Sin usuarios</p>';

        // Deudas por usuario
        let deudas = groupBy(d.reembolsos.filter(x => x.estado === 'pendiente'), 'uid');
        $('admDeudas').innerHTML = Object.keys(deudas).length ? Object.entries(deudas).map(([id, o]) => `
            <div class="flex justify-between items-center bg-bg p-2 rounded">
                <span class="text-info underline cursor-pointer" onclick="selectUser('${id}')">${(users[id] || {}).nombre || id}</span>
                <div class="flex items-center gap-2">
                    <b class="text-warning">${fmt(o.total)}</b>
                    <button onclick="selectUser('${id}')" class="text-xs bg-card px-2 py-1 rounded">Ver</button>
                </div>
            </div>
        `).join('') : '<p class="text-xs text-muted">Sin deudas pendientes</p>';

        // Gastos por evento
        let evs = groupBy(d.viaticos, 'evento');
        $('admEventos').innerHTML = Object.keys(evs).length ? Object.entries(evs).map(([k, o]) =>
            `<div class="flex justify-between"><span>${k}</span><b class="text-accent">${fmt(o.total)}</b></div>`
        ).join('') : '<p class="text-xs text-muted">Sin datos</p>';

        // Vacaciones pendientes
        let vPend = d.vacaciones.filter(x => x.estado === 'pendiente');
        $('lAdm').innerHTML = vPend.length ? vPend.map(v => `
            <div class="card p-2 text-xs">
                <div class="flex justify-between items-center">
                    <b>${v.dias} días hábiles</b>
                    ${bdg(v.estado)}
                </div>
                <p class="text-muted mt-1">${(users[v.uid] || {}).nombre || v.uid}</p>
                <p class="text-muted">${fdt(v.fechaInicio)} → ${fdt(v.fechaFin)}</p>
                <button onclick="chg('vacacion','${v.id}','aprobado')" class="mt-2 text-xs bg-info/20 text-info px-2 py-1 rounded w-full">✓ Aprobar</button>
            </div>
        `).join('') : '<p class="text-center text-muted text-xs p-2">Nada pendiente</p>';
    }

    // ─── ADMIN DETALLE USUARIO ───────────────────────────────────────────────
    function renderAdminDetail(uid) {
        const user   = (d.usuarios || {})[uid] || {nombre: uid};
        const vList  = d.viaticos.filter(x => x.uid === uid);
        const rList  = d.reembolsos.filter(x => x.uid === uid);
        const vacList = d.vacaciones.filter(x => x.uid === uid);

        const rPend  = rList.filter(x => x.estado === 'pendiente');
        const rPagado = rList.filter(x => x.estado === 'pagado');
        const totalDeuda = rPend.reduce((s, x) => s + (x.monto || 0), 0);

        $('adminContent').innerHTML = `
            <button onclick="clearSelectedUser()" class="mb-4 text-accent text-sm flex items-center gap-1">← Todos los usuarios</button>

            <div class="card p-3 mb-3 border-l-4 border-accent">
                <h3 class="font-bold">${user.nombre}</h3>
                <p class="text-xs text-muted">${uid}</p>
                ${totalDeuda > 0 ? `<p class="text-xs text-warning mt-1">Deuda pendiente: ${fmt(totalDeuda)}</p>` : ''}
            </div>

            <!-- Viáticos -->
            <div class="card p-3 mb-3">
                <p class="text-muted text-xs mb-2">Viáticos (${vList.length})</p>
                ${vList.length ? vList.map(v => `
                    <div class="flex justify-between items-start py-1 border-b border-border text-xs">
                        <div>
                            <p class="font-bold">${v.concepto}</p>
                            <p class="text-muted">${v.evento || 'Sin evento'} · ${fdt(v.fecha)}</p>
                            ${v.foto ? `<a href="${v.foto}" target="_blank" class="text-info underline">Ver comprobante</a>` : ''}
                        </div>
                        <b class="text-accent ml-2">${fmt(v.monto)}</b>
                    </div>
                `).join('') : '<p class="text-xs text-muted">Sin registros</p>'}
            </div>

            <!-- Reembolsos pendientes -->
            <div class="card p-3 mb-3">
                <p class="text-muted text-xs mb-2">Reembolsos pendientes</p>
                ${rPend.length ? rPend.map(r => `
                    <div class="card p-2 mb-2 text-xs">
                        <div class="flex justify-between">
                            <b>${r.concepto}</b>
                            <b class="text-warning">${fmt(r.monto)}</b>
                        </div>
                        <p class="text-muted">${fdt(r.fecha)}</p>
                        ${r.foto ? `<a href="${r.foto}" target="_blank" class="text-info underline">Ver comprobante</a>` : '<span class="text-muted opacity-50">Sin comprobante</span>'}
                        <button onclick="chg('reembolso','${r.id}','pagado')" class="mt-2 w-full bg-accent/20 text-accent rounded py-1 font-bold">✓ Registrar pago</button>
                    </div>
                `).join('') : '<p class="text-xs text-muted">Sin pendientes</p>'}
            </div>

            <!-- Historial de reembolsos pagados -->
            ${rPagado.length ? `
            <div class="card p-3 mb-3">
                <p class="text-muted text-xs mb-2">Reembolsos pagados</p>
                ${rPagado.map(r => `
                    <div class="card p-2 mb-1 text-xs opacity-70">
                        <div class="flex justify-between">
                            <b>${r.concepto}</b>
                            <b class="text-accent">${fmt(r.monto)}</b>
                        </div>
                        <p class="text-muted">Pagado: ${fdt(r.fechaPago)}</p>
                    </div>
                `).join('')}
            </div>` : ''}

            <!-- Vacaciones -->
            <div class="card p-3">
                <p class="text-muted text-xs mb-2">Vacaciones</p>
                ${vacList.length ? vacList.map(v => `
                    <div class="card p-2 mb-2 text-xs">
                        <div class="flex justify-between items-center">
                            <b>${v.dias} días hábiles</b>
                            ${bdg(v.estado)}
                        </div>
                        <p class="text-muted">${fdt(v.fechaInicio)} → ${fdt(v.fechaFin)}</p>
                        ${v.estado === 'pendiente' ? `<button onclick="chg('vacacion','${v.id}','aprobado')" class="mt-2 w-full bg-info/20 text-info rounded py-1">✓ Aprobar</button>` : ''}
                    </div>
                `).join('') : '<p class="text-xs text-muted">Sin registros</p>'}
            </div>
        `;
    }

    window.selectUser     = id => { selectedUser = id; render(); };
    window.clearSelectedUser = () => { selectedUser = null; render(); };

    // ─── CARGAR DATOS ────────────────────────────────────────────────────────
    async function load() {
        const res = await api(u.isAdmin ? 'getAdminDatos' : 'getDatos', {email: u.email});
        if (res.viaticos)   d.viaticos   = res.viaticos;
        if (res.reembolsos) d.reembolsos = res.reembolsos;
        if (res.vacaciones) d.vacaciones = res.vacaciones;
        if (res.usuarios)   d.usuarios   = res.usuarios;
        render();
    }

    // ─── CAMBIAR ESTADO ──────────────────────────────────────────────────────
    window.chg = async (tipo, id, nuevo) => {
        if (!confirm('¿Confirmar acción?')) return;
        const res = await api('cambiarEstatus', {tipo, id, nuevo, email: u.email});
        if (res.ok) load();
        else alert('Error: ' + res.error);
    };

    // ─── MODALES ─────────────────────────────────────────────────────────────
    function openModal(t) {
        let h = '';
        if (t === 'via') {
            $('mTit').innerText = "Viático";
            h = `<form onsubmit="sv('via',event)" class="space-y-2">
                <input name="fecha" type="date" required>
                <input name="evento" placeholder="Evento" required>
                <input name="concepto" placeholder="Concepto" required>
                <input name="monto" type="number" step="0.01" placeholder="Monto" required>
                <div>
                    <p class="text-xs text-muted mb-1">Comprobante (opcional)</p>
                    <input type="file" id="fileVia" accept="image/*,application/pdf" class="text-xs">
                </div>
                <button class="w-full p-2 bg-accent text-bg rounded font-bold">Guardar</button>
            </form>`;
        }
        if (t === 'ree') {
            $('mTit').innerText = "Reembolso";
            h = `<form onsubmit="sv('ree',event)" class="space-y-2">
                <input name="fecha" type="date" required>
                <input name="evento" placeholder="Evento" required>
                <input name="concepto" placeholder="Concepto" required>
                <input name="monto" type="number" step="0.01" placeholder="Monto" required>
                <div>
                    <p class="text-xs text-muted mb-1">Comprobante (opcional)</p>
                    <input type="file" id="fileRee" accept="image/*,application/pdf" class="text-xs">
                </div>
                <button class="w-full p-2 bg-warning text-bg rounded font-bold">Guardar</button>
            </form>`;
        }
        if (t === 'vac') {
            $('mTit').innerText = "Solicitar Vacaciones";
            h = `<form onsubmit="sv('vac',event)" class="space-y-2">
                <label class="text-xs text-muted">Fecha inicio</label>
                <input name="fi" type="date" required>
                <label class="text-xs text-muted">Fecha fin</label>
                <input name="ff" type="date" required>
                <p id="diasCalc" class="text-xs text-info"></p>
                <button class="w-full p-2 bg-info text-bg rounded font-bold">Solicitar</button>
            </form>`;
            setTimeout(() => {
                const fi = document.querySelector('[name=fi]');
                const ff = document.querySelector('[name=ff]');
                const upd = () => {
                    if (fi.value && ff.value) {
                        const n = calcDias(fi.value, ff.value);
                        $('diasCalc').innerText = n > 0 ? `${n} días hábiles (sin domingos)` : 'Rango inválido';
                    }
                };
                fi.addEventListener('change', upd);
                ff.addEventListener('change', upd);
            }, 100);
        }
        if (t === 'usr') {
            $('mTit').innerText = "Nuevo Usuario";
            h = `<form onsubmit="sv('usr',event)" class="space-y-2">
                <input name="nombre" placeholder="Nombre completo" required>
                <input name="email" type="email" placeholder="Correo (será su usuario)" required>
                <select name="rol">
                    <option value="false">Empleado</option>
                    <option value="true">Admin</option>
                </select>
                <input name="dias" type="number" placeholder="Días de vacaciones" value="15">
                <button class="w-full p-2 bg-purple-500 text-white rounded font-bold">Guardar</button>
            </form>`;
        }
        $('mBod').innerHTML = h;
        $('mod').classList.remove('hidden');
    }

    // ─── GUARDAR FORMULARIOS ─────────────────────────────────────────────────
    window.sv = async (t, e) => {
        e.preventDefault();
        const f = e.target;
        let o = {uid: u.email};
        let res;

        if (t === 'via') {
            o.fecha    = f.fecha.value;
            o.evento   = f.evento.value;
            o.concepto = f.concepto.value;
            o.monto    = parseFloat(f.monto.value);
            o.tipo     = 'Gasto';
            o.metodo   = 'Efectivo';
            const fv = document.getElementById('fileVia');
            if (fv && fv.files[0]) {
                const file = fv.files[0];
                o.archivoBase64 = await new Promise(r => {
                    const reader = new FileReader();
                    reader.onload = ev => r(ev.target.result.split(',')[1]);
                    reader.readAsDataURL(file);
                });
                o.archivoNombre = file.name;
                o.archivoTipo   = file.type;
            }
            res = await api('guardarViatico', {datos: JSON.stringify(o)});
        }

        if (t === 'ree') {
            o.fecha    = f.fecha.value;
            o.evento   = f.evento.value;
            o.concepto = f.concepto.value;
            o.monto    = parseFloat(f.monto.value);
            o.tipoComp = 'Ticket';
            o.estado   = 'pendiente';
            const fr = document.getElementById('fileRee');
            if (fr && fr.files[0]) {
                const file = fr.files[0];
                o.archivoBase64 = await new Promise(r => {
                    const reader = new FileReader();
                    reader.onload = ev => r(ev.target.result.split(',')[1]);
                    reader.readAsDataURL(file);
                });
                o.archivoNombre = file.name;
                o.archivoTipo   = file.type;
            }
            res = await api('guardarReembolso', {datos: JSON.stringify(o)});
        }

        if (t === 'vac') {
            o.fechaInicio = f.fi.value;
            o.fechaFin    = f.ff.value;
            o.dias        = calcDias(f.fi.value, f.ff.value);
            o.estado      = 'pendiente';
            if (o.dias <= 0) { alert('Rango de fechas inválido'); return; }
            res = await api('guardarVacacion', {datos: JSON.stringify(o)});
        }

        if (t === 'usr') {
            o.nombre  = f.nombre.value;
            o.email   = f.email.value;
            o.isAdmin = f.rol.value === 'true';
            o.diasVac = parseInt(f.dias.value) || 15;
            res = await api('guardarUsuario', {datos: JSON.stringify(o), email: u.email});
        }

        if (res && res.ok) {
            $('mod').classList.add('hidden');
            load();
        } else {
            alert('Error: ' + (res ? res.error : 'Sin respuesta'));
        }
    };

    // ─── LOGIN ────────────────────────────────────────────────────────────────
    $('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        $('err').classList.add('hidden');
        const res = await api('login', {email: $('userInput').value});
        if (res.ok) {
            const exp = res.usuario.nombre.toLowerCase().replace(/ /g, '') + '68';
            if ($('passInput').value.toLowerCase() === exp) {
                u = res.usuario;
                $('loginScreen').classList.add('hidden');
                $('mainApp').classList.remove('hidden');
                $('uname').innerText = u.nombre;
                if (u.isAdmin) {
                    $('navAdm').classList.remove('hidden');
                    $('navAdm').classList.add('admin-visible');
                }
                load();
            } else {
                $('err').innerText = 'Contraseña incorrecta';
                $('err').classList.remove('hidden');
            }
        } else {
            $('err').innerText = res.error || 'Error al iniciar sesión';
            $('err').classList.remove('hidden');
        }
    };

    // ─── NAVEGACIÓN ──────────────────────────────────────────────────────────
    document.querySelectorAll('.nav').forEach(n => n.onclick = function() {
        if (selectedUser && this.dataset.s !== 'sAdm') selectedUser = null;
        document.querySelectorAll('.nav').forEach(x => x.classList.remove('active'));
        this.classList.add('active');
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        $(this.dataset.s).classList.add('active');
        const titles = {sVia:'Viáticos', sRee:'Reembolsos', sVac:'Vacaciones', sAdm:'Admin'};
        $('htitle').innerText = titles[this.dataset.s];
        render();
    });

    $('logout').onclick = () => { u = null; d = {viaticos:[], reembolsos:[], vacaciones:[], usuarios:{}}; location.reload(); };
    </script>
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        });
    }
    </script>
</body>
</html>
