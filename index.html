<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Seis.8</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<meta name="theme-color" content="#111008">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Seis.8">
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:#111008;color:#e8e0d0;min-height:100dvh;overflow-x:hidden}
:root{
  --bg:#111008;--bg2:#1a1610;--bg3:#221e14;--border:#2e2818;--border2:#3d3520;
  --gold:#c9a84c;--gold2:#e8c96a;--red:#d94f3d;--red2:#f06050;
  --text:#e8e0d0;--muted:#7a7060;--muted2:#4a4435;--green:#52be80;--blue:#5dade2;
}
/* LOGIN */
#loginScreen{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background:radial-gradient(ellipse 80% 50% at 50% 0%,#2a2010 0%,#111008 70%)}
.login-logo{width:72px;height:72px;background:var(--gold);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 0 40px rgba(201,168,76,.25)}
.login-logo span{font-size:26px;font-weight:700;color:#111008;letter-spacing:-.5px}
.login-title{font-size:28px;font-weight:700;color:var(--text);letter-spacing:-.5px;margin-bottom:2px;text-align:center}
.login-sub{font-size:11px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-bottom:36px;text-align:center}
.login-form{width:100%;max-width:340px;display:flex;flex-direction:column;gap:10px}
.login-input{background:var(--bg2);border:1px solid var(--border2);color:var(--text);border-radius:10px;padding:14px 16px;font-size:14px;font-family:inherit;width:100%;transition:border-color .2s}
.login-input:focus{outline:none;border-color:var(--gold)}
.login-input::placeholder{color:var(--muted2)}
.login-btn{background:var(--red);color:#fff;font-weight:700;font-size:14px;letter-spacing:.04em;border:none;border-radius:10px;padding:14px;cursor:pointer;margin-top:4px}
#loginErr{color:var(--red2);font-size:12px;text-align:center;display:none;margin-top:4px}
/* HEADER */
#appHeader{position:sticky;top:0;z-index:200;background:var(--bg);border-bottom:1px solid var(--border)}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:10px 16px}
.header-brand{display:flex;align-items:center;gap:8px}
.header-icon{width:28px;height:28px;background:var(--gold);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.header-icon span{font-size:11px;font-weight:700;color:#111008}
.header-title{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.header-user{display:flex;align-items:center;gap:10px}
.user-pill{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:600;color:var(--gold);letter-spacing:.03em}
.logout-btn{font-size:11px;color:var(--red2);font-weight:600;background:none;border:none;cursor:pointer;padding:4px}
/* NAV */
.nav-tabs{display:flex;padding:0 8px;gap:2px;overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--muted);font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;transition:all .15s;flex-shrink:0;border:none;background:none}
.nav-tab svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8}
.nav-tab.active{color:var(--gold);background:rgba(201,168,76,.1)}
.nav-tab.active svg{stroke:var(--gold)}
#navAdm{display:none}
/* MAIN */
#mainApp{display:none;min-height:100dvh}
#mainContent{padding:16px}
.section{display:none}.section.active{display:block}
/* STAT CARDS */
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
.stat-box.full{grid-column:1/-1}
.stat-lbl{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.stat-val{font-size:24px;font-weight:700;color:var(--gold);letter-spacing:-.5px;line-height:1}
.stat-val.blue{color:var(--blue)}
.stat-val.green{color:var(--green)}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px}
/* SECTION HEADER */
.sec-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.sec-title{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
/* EVENTO PILLS */
.evento-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.12);border-radius:8px;margin-bottom:6px}
.evento-name{font-size:12px;color:var(--muted);font-weight:500}
.evento-total{font-size:13px;font-weight:700;color:var(--gold)}
/* LIST ITEMS */
.list-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px}
.item-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.item-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}
.item-sub{font-size:11px;color:var(--muted)}
.item-amount{font-size:15px;font-weight:700;color:var(--gold);flex-shrink:0}
.item-amount.warn{color:#e8a84a}
.comprobante-link{font-size:11px;color:var(--blue);margin-top:6px;display:inline-block}
/* BADGES */
.badge{display:inline-flex;align-items:center;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:20px}
.badge-pendiente{background:rgba(201,168,76,.15);color:var(--gold);border:1px solid rgba(201,168,76,.3)}
.badge-aprobado{background:rgba(93,173,226,.15);color:var(--blue);border:1px solid rgba(93,173,226,.3)}
.badge-pagado{background:rgba(82,190,128,.15);color:var(--green);border:1px solid rgba(82,190,128,.3)}
.badge-completada{background:rgba(82,190,128,.2);color:var(--green);border:1px solid rgba(82,190,128,.4)}
.badge-admin{background:rgba(201,168,76,.2);color:var(--gold2);border:1px solid rgba(201,168,76,.4)}
/* HIST */
.hist-label{font-size:10px;font-weight:700;color:var(--muted2);letter-spacing:.1em;text-transform:uppercase;margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
/* BOTONES */
.btn-red{background:var(--red);color:#fff;font-weight:700;font-size:13px;letter-spacing:.04em;border:none;border-radius:8px;padding:11px 16px;cursor:pointer;width:100%}
.btn-gold-outline{background:transparent;color:var(--gold);font-weight:600;font-size:13px;border:1px dashed var(--border2);border-radius:10px;padding:12px;cursor:pointer;width:100%;margin-bottom:14px}
.btn-action{background:rgba(201,168,76,.1);color:var(--gold);font-weight:600;font-size:12px;border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:10px;cursor:pointer;width:100%;margin-top:10px}
.btn-approve{background:rgba(93,173,226,.1);color:var(--blue);font-weight:600;font-size:12px;border:1px solid rgba(93,173,226,.2);border-radius:8px;padding:10px;cursor:pointer;width:100%;margin-top:10px}
.btn-back{background:none;border:none;color:var(--gold);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;margin-bottom:18px;padding:0}
.btn-green{background:rgba(82,190,128,.15);color:var(--green);font-weight:600;font-size:12px;border:1px solid rgba(82,190,128,.3);border-radius:8px;padding:10px;cursor:pointer;width:100%;margin-top:10px}
/* ADMIN */
.admin-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.admin-card-title{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}
.admin-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.admin-row:last-child{border-bottom:none}
.user-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;margin-bottom:6px;cursor:pointer}
.user-name{font-size:13px;font-weight:600;color:var(--gold)}
.vac-item{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
.prov-item{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:12px;margin-bottom:8px}
/* MODAL */
#mod{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;align-items:flex-end;justify-content:center}
#mod.open{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;padding:20px 20px 40px}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 18px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.modal-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1;padding:2px 6px}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.form-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.form-input{background:var(--bg);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:12px 14px;font-size:14px;font-family:inherit;width:100%;transition:border-color .2s}
.form-input:focus{outline:none;border-color:var(--gold)}
.form-input::placeholder{color:var(--muted2)}
.form-select{background:var(--bg);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:12px 14px;font-size:14px;font-family:inherit;width:100%}
.days-preview{font-size:12px;color:var(--blue);min-height:16px;margin-top:2px}
.file-input{font-size:12px;color:var(--muted);background:var(--bg);border:1px dashed var(--border2);border-radius:8px;padding:10px;width:100%;cursor:pointer}
.empty{text-align:center;padding:32px 16px;color:var(--muted2);font-size:13px}
.deuda-amount{font-size:14px;font-weight:700;color:#e8a84a}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
/* PAGOS PARCIALES */
.pago-parcial{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.pago-num{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.pago-fecha{font-size:12px;color:var(--text)}
.pago-monto{font-size:13px;font-weight:700;color:var(--gold)}
/* CHECKBOX REPORTE */
.check-item{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;margin-bottom:6px;cursor:pointer}
.check-item input[type=checkbox]{width:16px;height:16px;accent-color:var(--gold)}
.check-item label{font-size:13px;color:var(--text);cursor:pointer;flex:1}
/* PROVEEDOR CARD */
.sol-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.sol-proveedor{font-size:15px;font-weight:700;color:var(--gold);margin-bottom:2px}
.sol-meta{font-size:11px;color:var(--muted);margin-bottom:8px}
.progress-bar{height:4px;background:var(--border2);border-radius:2px;margin:8px 0}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}
/* TABS DENTRO DE ADMIN */
.sub-tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto}
.sub-tab{font-size:11px;font-weight:600;padding:6px 12px;border-radius:6px;border:1px solid var(--border2);color:var(--muted);cursor:pointer;white-space:nowrap;background:none}
.sub-tab.active{color:var(--gold);background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.3)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-logo"><span>6.8</span></div>
  <p class="login-title">Seis.8</p>
  <p class="login-sub">Sistema Administrativo</p>
  <form id="loginForm" class="login-form">
    <input type="email" id="userInput" class="login-input" placeholder="Correo electrónico" required autocomplete="email">
    <input type="password" id="passInput" class="login-input" placeholder="Contraseña" required autocomplete="current-password">
    <p id="loginErr"></p>
    <button type="submit" class="login-btn">INGRESAR</button>
  </form>
  <p style="font-size:10px;color:var(--muted2);margin-top:40px;letter-spacing:.1em">SEIS.8 INTEGRACIÓN S.A. DE C.V.</p>
</div>

<!-- APP -->
<div id="mainApp">
  <div id="appHeader">
    <div class="header-top">
      <div class="header-brand">
        <div class="header-icon"><span>6.8</span></div>
        <span class="header-title" id="htitle">Viáticos</span>
      </div>
      <div class="header-user">
        <span class="user-pill" id="uname"></span>
        <button class="logout-btn" id="logout">Salir</button>
      </div>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" data-s="sVia" data-t="Viáticos">
        <svg viewBox="0 0 24 24"><path d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75"/></svg>
        Viáticos
      </button>
      <button class="nav-tab" data-s="sRee" data-t="Reembolsos">
        <svg viewBox="0 0 24 24"><path d="M9 14.25l6-6m4.5-3.493V21.75l-3.75-1.5-3.75 1.5-3.75-1.5-3.75 1.5V4.757c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0111.186 0c1.1.128 1.907 1.077 1.907 2.185z"/></svg>
        Reembolsos
      </button>
      <button class="nav-tab" data-s="sVac" data-t="Vacaciones">
        <svg viewBox="0 0 24 24"><path d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5"/></svg>
        Vacaciones
      </button>
      <button class="nav-tab" data-s="sProv" data-t="Proveedores">
        <svg viewBox="0 0 24 24"><path d="M13.5 21v-7.5a.75.75 0 01.75-.75h3a.75.75 0 01.75.75V21m-4.5 0H2.36m11.14 0H18m0 0h3.64m-1.39 0V9.349m-16.5 11.65V9.35m0 0a3.001 3.001 0 003.75-.615A2.993 2.993 0 009.75 9.75c.896 0 1.7-.393 2.25-1.016a2.993 2.993 0 002.25 1.016c.896 0 1.7-.393 2.25-1.016a3.001 3.001 0 003.75.614m-16.5 0a3.004 3.004 0 01-.621-4.72L4.318 3.44A1.5 1.5 0 015.378 3h13.243a1.5 1.5 0 011.06.44l1.19 1.189a3 3 0 01-.621 4.72m-13.5 8.65h3.75a.75.75 0 00.75-.75V13.5a.75.75 0 00-.75-.75H6.75a.75.75 0 00-.75.75v3.75c0 .415.336.75.75.75z"/></svg>
        Proveedores
      </button>
      <button class="nav-tab" id="navAdm" data-s="sAdm" data-t="Admin">
        <svg viewBox="0 0 24 24"><path d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/></svg>
        Admin
      </button>
    </div>
  </div>

  <div id="mainContent">
    <!-- VIÁTICOS -->
    <section id="sVia" class="section active">
      <div class="stats-row">
        <div class="stat-box full">
          <div class="stat-lbl">Total General</div>
          <div class="stat-val" id="tVia">$0</div>
        </div>
      </div>
      <div id="viaEventos"></div>
      <button class="btn-gold-outline" onclick="openModal('via')">+ Agregar viático</button>
      <div id="lVia"></div>
    </section>

    <!-- REEMBOLSOS -->
    <section id="sRee" class="section">
      <div class="stats-row">
        <div class="stat-box full">
          <div class="stat-lbl">Por Pagar</div>
          <div class="stat-val" id="tRee" style="color:#e8a84a">$0</div>
        </div>
      </div>
      <button class="btn-gold-outline" onclick="openModal('ree')" style="border-color:rgba(232,168,74,.3);color:#e8a84a">+ Agregar reembolso</button>
      <div id="lRee"></div>
      <div id="lReeHist"></div>
    </section>

    <!-- VACACIONES -->
    <section id="sVac" class="section">
      <div class="stats-row">
        <div class="stat-box full">
          <div class="stat-lbl">Días Disponibles</div>
          <div class="stat-val blue" id="tVac">15</div>
          <div class="stat-sub" id="vacPendientes"></div>
        </div>
      </div>
      <button class="btn-gold-outline" onclick="openModal('vac')" style="border-color:rgba(93,173,226,.3);color:var(--blue)">+ Solicitar vacaciones</button>
      <div id="lVac"></div>
    </section>

    <!-- PROVEEDORES -->
    <section id="sProv" class="section">
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-lbl">Pendientes</div>
          <div class="stat-val" id="tProvPend">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-lbl">Por Pagar</div>
          <div class="stat-val" id="tProvMonto" style="color:#e8a84a">$0</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:14px">
        <button class="btn-gold-outline" onclick="openModal('sol')" style="margin-bottom:0;flex:1">+ Solicitar pago</button>
        <button class="btn-gold-outline" onclick="openModal('prov')" style="margin-bottom:0;flex:1;border-color:rgba(82,190,128,.3);color:var(--green)">+ Proveedor</button>
      </div>
      <div id="lProv"></div>
    </section>

    <!-- ADMIN -->
    <section id="sAdm" class="section">
      <div class="sub-tabs">
        <button class="sub-tab active" onclick="setAdmTab('general')">General</button>
        <button class="sub-tab" onclick="setAdmTab('pagos')">Pagos Proveedores</button>
        <button class="sub-tab" onclick="setAdmTab('reportes')">Reportes</button>
      </div>
      <div id="adminContent"></div>
    </section>
  </div>
</div>

<!-- MODAL -->
<div id="mod">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="mTit"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="mBod"></div>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbxDBnYqKuUGirXBADXqvVM3gywD8ZCVcYfScmcaHsE-7w3GZ4gZlznQ1RFwMlQMOxCj/exec';
const TOK = 'seis8_token_2024';

const $ = id => document.getElementById(id);
const fmt = n => new Intl.NumberFormat('es-MX',{style:'currency',currency:'MXN'}).format(n||0);
const fdt = d => d ? new Date(d).toLocaleDateString('es-MX',{day:'numeric',month:'short'}) : '-';
const bdg = s => `<span class="badge badge-${s}">${s}</span>`;

let u = null;
let d = {viaticos:[],reembolsos:[],vacaciones:[],usuarios:{},solicitudes:[],pagos:[],proveedores:[]};
let selectedUser = null;
let admTab = 'general';
let EVENTOS = ['BALTIMORE','CONSTELACIONES','ANIVERSARIO FAAHORRO','POSADA FAAHORRO','GASTOS DE OFICINA','OTROS'];

// ─── API ──────────────────────────────────────────────────────────────────
async function api(act, params={}) {
  try {
    const datosStr = params.datos || '';
    const tieneArchivo = datosStr && (() => {
      try { return !!JSON.parse(datosStr).archivoBase64; } catch(e) { return false; }
    })();
    if (tieneArchivo) {
      const body = new URLSearchParams({accion:act,token:TOK,...params});
      const res = await fetch(API,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body.toString()});
      const text = await res.text();
      try { return JSON.parse(text); } catch(e) { return {error:text}; }
    }
    let url = `${API}?accion=${act}&token=${TOK}`;
    for (let k in params) url += `&${k}=${encodeURIComponent(params[k])}`;
    const res = await fetch(url);
    const text = await res.text();
    try { return JSON.parse(text); } catch(e) { return {error:text}; }
  } catch(e) { return {error:'Red: '+e.message}; }
}

// ─── UTILIDADES ──────────────────────────────────────────────────────────
function calcDias(fi,ff) {
  let dias=0, act=new Date(fi), fin=new Date(ff);
  if (fi>ff) return 0;
  while(act<=fin){ if(act.getDay()!==0) dias++; act.setDate(act.getDate()+1); }
  return dias;
}
function groupBy(arr,key) {
  return arr.reduce((a,i)=>{ const k=i[key]||'Sin dato'; if(!a[k]) a[k]={total:0,items:[]}; a[k].total+=(i.monto||0); a[k].items.push(i); return a; },{});
}
function fileToB64(file) {
  return new Promise(r=>{ const rd=new FileReader(); rd.onload=e=>r(e.target.result.split(',')[1]); rd.readAsDataURL(file); });
}

// ─── EVENTOS DROPDOWN ────────────────────────────────────────────────────
function eventoSelectHTML(name, required=true) {
  const opts = EVENTOS.map(e=>`<option value="${e}">${e}</option>`).join('');
  return `
    <select name="${name}" id="sel_${name}" class="form-select" ${required?'required':''} onchange="checkNuevoEvento('${name}')">
      <option value="">— Selecciona evento —</option>
      ${opts}
      <option value="__nuevo__">+ Agregar nuevo evento...</option>
    </select>
    <input type="text" id="new_${name}" class="form-input" placeholder="Nombre del evento (se guardará en MAYÚSCULAS)" style="display:none;margin-top:6px" oninput="this.value=this.value.toUpperCase()">
  `;
}
function checkNuevoEvento(name) {
  const sel = $(`sel_${name}`);
  const inp = $(`new_${name}`);
  if (sel.value==='__nuevo__') { inp.style.display='block'; inp.focus(); }
  else { inp.style.display='none'; }
}
async function resolveEvento(name) {
  const sel = $(`sel_${name}`);
  const inp = $(`new_${name}`);
  if (sel.value==='__nuevo__') {
    const nuevo = inp.value.toUpperCase().trim();
    if (!nuevo) return null;
    await api('crearEvento',{nombre:nuevo});
    if (!EVENTOS.includes(nuevo)) EVENTOS.push(nuevo);
    return nuevo;
  }
  return sel.value || null;
}

async function cargarEventos() {
  const res = await api('getEventos');
  if (res.ok && res.eventos) EVENTOS = res.eventos;
}

window.renderReporteEvento = function() {
  const ev = $('selEventoRep').value;
  if (!ev) return;
  const sols = d.solicitudes.filter(s=>s.evento===ev);
  const pagsTodos = d.pagos;
  let totalMonto=0, totalPagado=0, totalPend=0;
  sols.forEach(sol=>{
    totalMonto += parseFloat(sol.montoTotal)||0;
    const pagsSol = pagsTodos.filter(p=>p.solicitudId===sol.id);
    pagsSol.forEach(p=>{
      if(p.estado==='pagado') totalPagado+=parseFloat(p.monto)||0;
      else totalPend+=parseFloat(p.monto)||0;
    });
  });
  $('reporteEvento').innerHTML = `
    <div class="stats-row" style="margin-top:12px">
      <div class="stat-box"><div class="stat-lbl">Total comprometido</div><div class="stat-val" style="font-size:18px">${fmt(totalMonto)}</div></div>
      <div class="stat-box"><div class="stat-lbl">Pagado</div><div class="stat-val green" style="font-size:18px">${fmt(totalPagado)}</div></div>
      <div class="stat-box full"><div class="stat-lbl">Por pagar</div><div class="stat-val" style="font-size:18px;color:#e8a84a">${fmt(totalPend)}</div></div>
    </div>
    ${sols.map(sol=>{
      const pagsSol = pagsTodos.filter(p=>p.solicitudId===sol.id);
      const pagado = pagsSol.filter(p=>p.estado==='pagado').reduce((s,p)=>s+(parseFloat(p.monto)||0),0);
      return `
        <div class="admin-row">
          <div>
            <div style="font-size:13px;font-weight:600;color:var(--text)">${sol.proveedorNombre}</div>
            <div style="font-size:11px;color:var(--muted2)">${sol.concepto}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:13px;font-weight:700;color:var(--gold)">${fmt(sol.montoTotal)}</div>
            <div style="font-size:11px;color:var(--green)">Pagado: ${fmt(pagado)}</div>
          </div>
        </div>
      `;
    }).join('')}
  `;
};

window.calcPagosParciales = function() {
  const numPagos = parseInt(document.querySelector('[name=numPagos]')?.value||'1');
  const monto = parseFloat(document.querySelector('[name=montoTotal]')?.value||0);
  const fgFre = $('fgFrecuencia');
  if (fgFre) fgFre.style.display = numPagos>1?'flex':'none';
  const prev = $('prevPagos');
  if (!prev) return;
  if (!monto || numPagos<=0) { prev.innerHTML=''; return; }
  const montoParcial = monto/numPagos;
  const frecuencia = document.querySelector('[name=frecuencia]')?.value||'mensual';
  const fechaBase = document.querySelector('[name=fechaReq]')?.value;
  let html = `<div style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px">Vista previa de pagos</div>`;
  for (let i=0;i<numPagos;i++) {
    let fecha = '—';
    if (fechaBase) {
      const d2 = new Date(fechaBase);
      if (frecuencia==='semanal') d2.setDate(d2.getDate()+(i*7));
      else if (frecuencia==='quincenal') d2.setDate(d2.getDate()+(i*15));
      else d2.setMonth(d2.getMonth()+i);
      fecha = d2.toLocaleDateString('es-MX',{day:'numeric',month:'short',year:'numeric'});
    }
    html += `<div class="pago-parcial"><div><div class="pago-num">Pago ${i+1}</div><div class="pago-fecha">${fecha}</div></div><div class="pago-monto">${fmt(montoParcial)}</div></div>`;
  }
  prev.innerHTML = html;
};

// ─── GUARDAR FORMULARIOS ─────────────────────────────────────────────────
window.sv = async function(t, box) {
  const getName = n => box.querySelector(`[name="${n}"]`)?.value||'';
  let o = {uid:u.email}, res;

  if (t==='via') {
    const evento = await resolveEvento('eventoVia');
    if (!evento) { alert('Selecciona un evento'); return; }
    o.fecha=getName('fecha'); o.evento=evento; o.concepto=getName('concepto');
    o.monto=parseFloat(getName('monto')); o.tipo='Gasto'; o.metodo='Efectivo';
    const fv=$('fileVia');
    if(fv&&fv.files[0]){ const f=fv.files[0]; o.archivoBase64=await fileToB64(f); o.archivoNombre=f.name; o.archivoTipo=f.type; }
    res=await api('guardarViatico',{datos:JSON.stringify(o)});
  }
  if (t==='ree') {
    const evento = await resolveEvento('eventoRee');
    if (!evento) { alert('Selecciona un evento'); return; }
    o.fecha=getName('fecha'); o.evento=evento; o.concepto=getName('concepto');
    o.monto=parseFloat(getName('monto')); o.tipoComp='Ticket'; o.estado='pendiente';
    const fr=$('fileRee');
    if(fr&&fr.files[0]){ const f=fr.files[0]; o.archivoBase64=await fileToB64(f); o.archivoNombre=f.name; o.archivoTipo=f.type; }
    res=await api('guardarReembolso',{datos:JSON.stringify(o)});
  }
  if (t==='vac') {
    o.fechaInicio=getName('fi'); o.fechaFin=getName('ff');
    o.dias=calcDias(o.fechaInicio,o.fechaFin); o.estado='pendiente';
    if(o.dias<=0){alert('Rango de fechas inválido');return;}
    res=await api('guardarVacacion',{datos:JSON.stringify(o)});
  }
  if (t==='usr') {
    o.nombre=getName('nombre'); o.email=getName('email');
    o.isAdmin=getName('rol')==='true'; o.diasVac=parseInt(getName('dias'))||15;
    res=await api('guardarUsuario',{datos:JSON.stringify(o),email:u.email});
  }
  if (t==='prov') {
    o.nombre=getName('nombre'); o.banco=getName('banco');
    o.clabe=getName('clabe'); o.rfc=getName('rfc'); o.telefono=getName('telefono');
    res=await api('guardarProveedor',{datos:JSON.stringify(o),email:u.email});
  }
  if (t==='sol') {
    const evento = await resolveEvento('eventoSol');
    if (!evento) { alert('Selecciona un evento'); return; }
    const selProv = box.querySelector('[name=proveedorId]');
    const provId = selProv?.value;
    const provNombre = selProv?.options[selProv.selectedIndex]?.dataset?.nombre||provId;
    if (!provId) { alert('Selecciona un proveedor'); return; }
    const numPagos = parseInt(getName('numPagos'));
    const montoTotal = parseFloat(getName('montoTotal'));
    const frecuencia = getName('frecuencia')||'mensual';
    const fechaReq = getName('fechaReq');
    const montoParcial = montoTotal/numPagos;
    // Calcular fechas de cada pago
    const fechasPagos = [];
    for (let i=0;i<numPagos;i++) {
      const d2 = new Date(fechaReq);
      if (frecuencia==='semanal') d2.setDate(d2.getDate()+(i*7));
      else if (frecuencia==='quincenal') d2.setDate(d2.getDate()+(i*15));
      else d2.setMonth(d2.getMonth()+i);
      fechasPagos.push(d2.toISOString().split('T')[0]);
    }
    o.proveedorId=provId; o.proveedorNombre=provNombre;
    o.evento=evento; o.concepto=getName('concepto');
    o.montoTotal=montoTotal; o.fechaRequerida=fechaReq;
    o.numPagos=numPagos; o.frecuencia=frecuencia;
    o.fechasPagos=fechasPagos;
    const fs=$('fileSol');
    if(fs&&fs.files[0]){ const f=fs.files[0]; o.archivoBase64=await fileToB64(f); o.archivoNombre=f.name; o.archivoTipo=f.type; }
    res=await api('guardarSolicitud',{datos:JSON.stringify(o)});
  }

  if (res&&res.ok) { closeModal(); load(); }
  else alert('Error: '+(res?res.error:'Sin respuesta'));
};
