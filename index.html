<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:#111008;color:#e8e0d0;min-height:100dvh;overflow-x:hidden}

/* ── COLORES ── */
:root{
  --bg:#111008;
  --bg2:#1a1610;
  --bg3:#221e14;
  --border:#2e2818;
  --border2:#3d3520;
  --gold:#c9a84c;
  --gold2:#e8c96a;
  --red:#d94f3d;
  --red2:#f06050;
  --text:#e8e0d0;
  --muted:#7a7060;
  --muted2:#4a4435;
}

/* ── LOGIN ── */
#loginScreen{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background:radial-gradient(ellipse 80% 50% at 50% 0%,#2a2010 0%,#111008 70%)}
.login-logo{width:72px;height:72px;background:var(--gold);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 0 40px rgba(201,168,76,.25)}
.login-logo span{font-size:26px;font-weight:700;color:#111008;letter-spacing:-.5px}
.login-title{font-size:28px;font-weight:700;color:var(--text);letter-spacing:-.5px;margin-bottom:2px;text-align:center}
.login-sub{font-size:11px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-bottom:36px;text-align:center}
.login-form{width:100%;max-width:340px;display:flex;flex-direction:column;gap:10px}
.login-input{background:var(--bg2);border:1px solid var(--border2);color:var(--text);border-radius:10px;padding:14px 16px;font-size:14px;font-family:inherit;width:100%;transition:border-color .2s}
.login-input:focus{outline:none;border-color:var(--gold)}
.login-input::placeholder{color:var(--muted2)}
.login-btn{background:var(--red);color:#fff;font-weight:700;font-size:14px;letter-spacing:.04em;border:none;border-radius:10px;padding:14px;cursor:pointer;margin-top:4px;transition:background .15s}
.login-btn:active{background:var(--red2)}
#loginErr{color:var(--red2);font-size:12px;text-align:center;display:none;margin-top:4px}

/* ── HEADER ── */
#appHeader{position:sticky;top:0;z-index:200;background:var(--bg);border-bottom:1px solid var(--border)}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:10px 16px}
.header-brand{display:flex;align-items:center;gap:8px}
.header-icon{width:28px;height:28px;background:var(--gold);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.header-icon span{font-size:11px;font-weight:700;color:#111008}
.header-title{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.header-user{display:flex;align-items:center;gap:10px}
.user-pill{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:600;color:var(--gold);letter-spacing:.03em}
.logout-btn{font-size:11px;color:var(--red2);font-weight:600;background:none;border:none;cursor:pointer;padding:4px}

/* ── NAV ── */
.nav-tabs{display:flex;padding:0 8px;gap:2px;overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 12px;border-radius:8px;cursor:pointer;color:var(--muted);font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;transition:all .15s;flex-shrink:0;border:none;background:none}
.nav-tab svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8}
.nav-tab.active{color:var(--gold);background:rgba(201,168,76,.1)}
.nav-tab.active svg{stroke:var(--gold)}
#navAdm{display:none}

/* ── MAIN ── */
#mainApp{display:none;min-height:100dvh}
#mainContent{padding:16px}
.section{display:none}.section.active{display:block}

/* ── STAT CARDS ── */
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
.stat-box.full{grid-column:1/-1}
.stat-lbl{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.stat-val{font-size:24px;font-weight:700;color:var(--gold);letter-spacing:-.5px;line-height:1}
.stat-val.blue{color:#5dade2}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px}

/* ── SECTION HEADER ── */
.sec-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.sec-title{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}

/* ── EVENTO PILLS ── */
.evento-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.12);border-radius:8px;margin-bottom:6px}
.evento-name{font-size:12px;color:var(--muted);font-weight:500}
.evento-total{font-size:13px;font-weight:700;color:var(--gold)}

/* ── LIST ITEMS ── */
.list-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px}
.item-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.item-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}
.item-sub{font-size:11px;color:var(--muted)}
.item-amount{font-size:15px;font-weight:700;color:var(--gold);flex-shrink:0}
.item-amount.warn{color:#e8a84a}
.comprobante-link{font-size:11px;color:#5dade2;margin-top:6px;display:inline-block}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:20px}
.badge-pendiente{background:rgba(201,168,76,.15);color:var(--gold);border:1px solid rgba(201,168,76,.3)}
.badge-aprobado{background:rgba(93,173,226,.15);color:#5dade2;border:1px solid rgba(93,173,226,.3)}
.badge-pagado{background:rgba(82,190,128,.15);color:#52be80;border:1px solid rgba(82,190,128,.3)}
.badge-admin{background:rgba(201,168,76,.2);color:var(--gold2);border:1px solid rgba(201,168,76,.4)}

/* ── HISTORIAL ── */
.hist-label{font-size:10px;font-weight:700;color:var(--muted2);letter-spacing:.1em;text-transform:uppercase;margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border)}

/* ── BOTONES ── */
.btn-red{background:var(--red);color:#fff;font-weight:700;font-size:13px;letter-spacing:.04em;border:none;border-radius:8px;padding:11px 16px;cursor:pointer;width:100%;transition:background .15s}
.btn-red:active{background:var(--red2)}
.btn-gold-outline{background:transparent;color:var(--gold);font-weight:600;font-size:13px;border:1px dashed var(--border2);border-radius:10px;padding:12px;cursor:pointer;width:100%;margin-bottom:14px;transition:all .15s}
.btn-gold-outline:active{background:rgba(201,168,76,.06)}
.btn-action{background:rgba(201,168,76,.1);color:var(--gold);font-weight:600;font-size:12px;border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:10px;cursor:pointer;width:100%;margin-top:10px;transition:all .15s}
.btn-approve{background:rgba(93,173,226,.1);color:#5dade2;font-weight:600;font-size:12px;border:1px solid rgba(93,173,226,.2);border-radius:8px;padding:10px;cursor:pointer;width:100%;margin-top:10px;transition:all .15s}
.btn-back{background:none;border:none;color:var(--gold);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;margin-bottom:18px;padding:0}

/* ── ADMIN ── */
.admin-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.admin-card-title{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}
.admin-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.admin-row:last-child{border-bottom:none}
.user-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:border-color .15s}
.user-item:active{border-color:var(--gold)}
.user-name{font-size:13px;font-weight:600;color:var(--gold)}
.vac-item{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}

/* ── MODAL ── */
#mod{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;align-items:flex-end;justify-content:center}
#mod.open{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-top:1px solid var(--border2);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:20px 20px 40px}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 18px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.modal-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1;padding:2px 6px}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.form-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.form-input{background:var(--bg);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:12px 14px;font-size:14px;font-family:inherit;width:100%;transition:border-color .2s}
.form-input:focus{outline:none;border-color:var(--gold)}
.form-input::placeholder{color:var(--muted2)}
.days-preview{font-size:12px;color:#5dade2;min-height:16px;margin-top:2px}
.file-input{font-size:12px;color:var(--muted);background:var(--bg);border:1px dashed var(--border2);border-radius:8px;padding:10px;width:100%;cursor:pointer}

/* ── EMPTY ── */
.empty{text-align:center;padding:32px 16px;color:var(--muted2);font-size:13px}

/* ── DEUDA HIGHLIGHT ── */
.deuda-amount{font-size:14px;font-weight:700;color:#e8a84a}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>

<!-- ════ LOGIN ════ -->
<div id="loginScreen">
  <div class="login-logo"><span>6.8</span></div>
  <p class="login-title">Seis.8</p>
  <p class="login-sub">Sistema Administrativo</p>
  <form id="loginForm" class="login-form">
    <input type="email" id="userInput" class="login-input" placeholder="Correo electrónico" required autocomplete="email">
    <input type="password" id="passInput" class="login-input" placeholder="Contraseña" required autocomplete="current-password">
    <p id="loginErr"></p>
    <button type="submit" class="login-btn">INGRESAR</button>
  </form>
  <p style="font-size:10px;color:var(--muted2);margin-top:40px;letter-spacing:.1em">SEIS.8 INTEGRACIÓN S.A. DE C.V.</p>
</div>

<!-- ════ APP ════ -->
<div id="mainApp">
  <div id="appHeader">
    <div class="header-top">
      <div class="header-brand">
        <div class="header-icon"><span>6.8</span></div>
        <span class="header-title" id="htitle">Viáticos</span>
      </div>
      <div class="header-user">
        <span class="user-pill" id="uname"></span>
        <button class="logout-btn" id="logout">Salir</button>
      </div>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" data-s="sVia" data-t="Viáticos">
        <svg viewBox="0 0 24 24"><path d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75"/></svg>
        Viáticos
      </button>
      <button class="nav-tab" data-s="sRee" data-t="Reembolsos">
        <svg viewBox="0 0 24 24"><path d="M9 14.25l6-6m4.5-3.493V21.75l-3.75-1.5-3.75 1.5-3.75-1.5-3.75 1.5V4.757c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0111.186 0c1.1.128 1.907 1.077 1.907 2.185z"/></svg>
        Reembolsos
      </button>
      <button class="nav-tab" data-s="sVac" data-t="Vacaciones">
        <svg viewBox="0 0 24 24"><path d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5"/></svg>
        Vacaciones
      </button>
      <button class="nav-tab" id="navAdm" data-s="sAdm" data-t="Admin">
        <svg viewBox="0 0 24 24"><path d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/></svg>
        Admin
      </button>
    </div>
  </div>

  <div id="mainContent">
    <!-- VIÁTICOS -->
    <section id="sVia" class="section active">
      <div class="stats-row">
        <div class="stat-box full">
          <div class="stat-lbl">Total General</div>
          <div class="stat-val" id="tVia">$0</div>
        </div>
      </div>
      <div id="viaEventos"></div>
      <button class="btn-gold-outline" onclick="openModal('via')">+ Agregar viático</button>
      <div id="lVia"></div>
    </section>

    <!-- REEMBOLSOS -->
    <section id="sRee" class="section">
      <div class="stats-row">
        <div class="stat-box full">
          <div class="stat-lbl">Por Pagar</div>
          <div class="stat-val" id="tRee" style="color:#e8a84a">$0</div>
        </div>
      </div>
      <button class="btn-gold-outline" onclick="openModal('ree')" style="border-color:rgba(232,168,74,.3);color:#e8a84a">+ Agregar reembolso</button>
      <div id="lRee"></div>
      <div id="lReeHist"></div>
    </section>

    <!-- VACACIONES -->
    <section id="sVac" class="section">
      <div class="stats-row">
        <div class="stat-box full">
          <div class="stat-lbl">Días Disponibles</div>
          <div class="stat-val blue" id="tVac">15</div>
          <div class="stat-sub" id="vacPendientes"></div>
        </div>
      </div>
      <button class="btn-gold-outline" onclick="openModal('vac')" style="border-color:rgba(93,173,226,.3);color:#5dade2">+ Solicitar vacaciones</button>
      <div id="lVac"></div>
    </section>

    <!-- ADMIN -->
    <section id="sAdm" class="section">
      <div id="adminContent"></div>
    </section>
  </div>
</div>

<!-- ════ MODAL ════ -->
<div id="mod">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="mTit"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="mBod"></div>
  </div>
</div>

<script>
    const API = 'https://script.google.com/macros/s/AKfycby5h9BDXmw4cN5I_Ep76tFHvxx0_Fet5fitCxxund6B0q7gbob7HNfK5iXBxuoVEvm7/exec';
    const TOK = 'seis8_token_2024';

    const $ = id => document.getElementById(id);
    const fmt = n => new Intl.NumberFormat('es-MX', {style:'currency', currency:'MXN'}).format(n);
    const fdt = d => d ? new Date(d).toLocaleDateString('es-MX', {day:'numeric', month:'short'}) : '-';
    const bdg = s => `<span class="badge badge-${s}">${s}</span>`;

    let u = null;
    let d = {viaticos:[], reembolsos:[], vacaciones:[], usuarios:{}};
    let selectedUser = null;

    // ─── API ─────────────────────────────────────────────────────────────────
    async function api(act, params) {
        try {
            const datosStr = params.datos || '';
            const tieneArchivo = datosStr && (() => {
                try { return !!JSON.parse(datosStr).archivoBase64; } catch(e) { return false; }
            })();

            if (tieneArchivo) {
                const body = new URLSearchParams({accion: act, token: TOK, ...params});
                const res = await fetch(API, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: body.toString()
                });
                const text = await res.text();
                try { return JSON.parse(text); } catch(e) { return {error: text}; }
            }

            let url = `${API}?accion=${act}&token=${TOK}`;
            for (let k in params) url += `&${k}=${encodeURIComponent(params[k])}`;
            const res = await fetch(url);
            const text = await res.text();
            try { return JSON.parse(text); } catch(e) { return {error: text}; }
        } catch(e) { return {error: 'Red: ' + e.message}; }
    }

    // ─── UTILIDADES ──────────────────────────────────────────────────────────
    function calcDias(fi, ff) {
        let dias = 0, act = new Date(fi), fin = new Date(ff);
        if (fi > ff) return 0;
        while (act <= fin) { if (act.getDay() !== 0) dias++; act.setDate(act.getDate() + 1); }
        return dias;
    }

    function groupBy(arr, key) {
        return arr.reduce((a, i) => {
            const k = i[key] || 'Sin dato';
            if (!a[k]) a[k] = {total:0, items:[]};
            a[k].total += (i.monto || 0);
            a[k].items.push(i);
            return a;
        }, {});
    }

    // ─── RENDER PRINCIPAL ────────────────────────────────────────────────────
    function render() {
        if (!u) return;
        renderViaticos();
        renderReembolsos();
        renderVacaciones();
        if (u.isAdmin) {
            selectedUser ? renderAdminDetail(selectedUser) : renderAdminGeneral();
        }
    }

    // ─── VIÁTICOS ────────────────────────────────────────────────────────────
    function renderViaticos() {
        let lista = d.viaticos.filter(x => x.uid === u.email);
        $('tVia').innerText = fmt(lista.reduce((s, x) => s + (x.monto || 0), 0));

        let g = groupBy(lista, 'evento');
        $('viaEventos').innerHTML = Object.entries(g).map(([k, o]) =>
            `<div class="flex justify-between p-1 bg-bg rounded text-xs"><span>${k}</span><b>${fmt(o.total)}</b></div>`
        ).join('');

        $('lVia').innerHTML = lista.length ? lista.map(v => `
            <div class="card p-2 text-sm">
                <div class="flex justify-between">
                    <b>${v.concepto}</b>
                    <b class="text-accent">${fmt(v.monto)}</b>
                </div>
                <p class="text-xs text-muted">${v.evento || ''} · ${fdt(v.fecha)}</p>
                ${v.foto ? `<a href="${v.foto}" target="_blank" class="text-xs text-info underline">Ver comprobante</a>` : ''}
            </div>
        `).join('') : '<p class="text-center text-muted text-xs p-2">Vacío</p>';
    }

    // ─── REEMBOLSOS ──────────────────────────────────────────────────────────
    function renderReembolsos() {
        let lista = d.reembolsos.filter(x => x.uid === u.email);
        let pen  = lista.filter(x => x.estado === 'pendiente');
        let hist = lista.filter(x => x.estado === 'pagado');

        $('tRee').innerText = fmt(pen.reduce((s, x) => s + (x.monto || 0), 0));

        $('lRee').innerHTML = pen.length ? pen.map(r => `
            <div class="card p-2 text-sm">
                <div class="flex justify-between">
                    <b>${r.concepto}</b>
                    <b class="text-warning">${fmt(r.monto)}</b>
                </div>
                <div class="flex justify-between items-center mt-1">
                    <span class="text-xs text-muted">${fdt(r.fecha)}</span>
                    ${bdg(r.estado)}
                </div>
                ${r.foto ? `<a href="${r.foto}" target="_blank" class="text-xs text-info underline">Ver comprobante</a>` : ''}
            </div>
        `).join('') : '<p class="text-center text-muted text-xs p-2">Sin pendientes</p>';

        $('lReeHist').innerHTML = hist.length ? `
            <p class="text-muted text-xs mb-1">Historial:</p>
            ${hist.map(r => `
                <div class="card p-2 text-sm opacity-60">
                    <div class="flex justify-between">
                        <b>${r.concepto}</b>
                        <b>${fmt(r.monto)}</b>
                    </div>
                    <p class="text-xs text-muted">Pagado: ${fdt(r.fechaPago)}</p>
                    ${r.foto ? `<a href="${r.foto}" target="_blank" class="text-xs text-info underline">Ver comprobante</a>` : ''}
                </div>
            `).join('')}
        ` : '';
    }

    // ─── VACACIONES ──────────────────────────────────────────────────────────
    function renderVacaciones() {
        let lista = d.vacaciones.filter(x => x.uid === u.email);

        let usados = 0;
        lista.forEach(x => { if (x.estado === 'aprobado') usados += (parseInt(x.dias) || 0); });

        const diasBase = (d.usuarios && d.usuarios[u.email] && d.usuarios[u.email].diasVac)
            ? parseInt(d.usuarios[u.email].diasVac)
            : 15;
        $('tVac').innerText = Math.max(0, diasBase - usados);

        let pendDias = 0;
        lista.forEach(x => { if (x.estado === 'pendiente') pendDias += (parseInt(x.dias) || 0); });
        $('vacPendientes').innerText = pendDias > 0 ? `${pendDias} días en espera de aprobación` : '';

        $('lVac').innerHTML = lista.length ? lista.map(v => `
            <div class="card p-2 text-sm">
                <div class="flex justify-between">
                    <b>${v.dias} días hábiles</b>
                    ${bdg(v.estado)}
                </div>
                <p class="text-xs text-muted">${fdt(v.fechaInicio)} → ${fdt(v.fechaFin)}</p>
            </div>
        `).join('') : '<p class="text-center text-muted text-xs p-2">Vacío</p>';
    }

    // ─── ADMIN GENERAL ───────────────────────────────────────────────────────
    function renderAdminGeneral() {
        $('adminContent').innerHTML = `
            <h3 class="font-bold mb-3 text-lg">Panel Admin</h3>

            <div class="card p-3 mb-3 border-l-4 border-purple-500">
                <div class="flex justify-between items-center mb-2">
                    <p class="font-bold text-sm">Usuarios</p>
                    <button onclick="openModal('usr')" class="text-xs text-purple-400 border border-purple-400/30 rounded px-2 py-1">+ Agregar</button>
                </div>
                <div id="admUsers" class="space-y-1 text-sm max-h-40 overflow-y-auto"></div>
            </div>

            <div class="card p-3 mb-3">
                <p class="text-muted text-xs mb-2">Deudas por Usuario (Reembolsos pendientes)</p>
                <div id="admDeudas" class="space-y-1 text-sm"></div>
            </div>

            <div class="card p-3 mb-3">
                <p class="text-muted text-xs mb-2">Gastos por Evento</p>
                <div id="admEventos" class="space-y-1 text-sm"></div>
            </div>

            <div class="card p-3">
                <p class="text-muted text-xs mb-2">Vacaciones pendientes por aprobar</p>
                <div id="lAdm" class="space-y-2"></div>
            </div>
        `;

        const users = d.usuarios || {};

        // Lista de usuarios
        $('admUsers').innerHTML = Object.entries(users).map(([id, obj]) => `
            <div onclick="selectUser('${id}')" class="flex justify-between items-center bg-bg p-2 rounded cursor-pointer hover:opacity-80">
                <span class="text-info underline">${obj.nombre}</span>
                <div class="flex items-center gap-2">
                    ${obj.isAdmin ? '<span class="badge badge-admin">Admin</span>' : ''}
                    <span class="text-xs text-muted">${obj.diasVac || 15} días</span>
                </div>
            </div>
        `).join('') || '<p class="text-xs text-muted">Sin usuarios</p>';

        // Deudas por usuario
        let deudas = groupBy(d.reembolsos.filter(x => x.estado === 'pendiente'), 'uid');
        $('admDeudas').innerHTML = Object.keys(deudas).length ? Object.entries(deudas).map(([id, o]) => `
            <div class="flex justify-between items-center bg-bg p-2 rounded">
                <span class="text-info underline cursor-pointer" onclick="selectUser('${id}')">${(users[id] || {}).nombre || id}</span>
                <div class="flex items-center gap-2">
                    <b class="text-warning">${fmt(o.total)}</b>
                    <button onclick="selectUser('${id}')" class="text-xs bg-card px-2 py-1 rounded">Ver</button>
                </div>
            </div>
        `).join('') : '<p class="text-xs text-muted">Sin deudas pendientes</p>';

        // Gastos por evento
        let evs = groupBy(d.viaticos, 'evento');
        $('admEventos').innerHTML = Object.keys(evs).length ? Object.entries(evs).map(([k, o]) =>
            `<div class="flex justify-between"><span>${k}</span><b class="text-accent">${fmt(o.total)}</b></div>`
        ).join('') : '<p class="text-xs text-muted">Sin datos</p>';

        // Vacaciones pendientes
        let vPend = d.vacaciones.filter(x => x.estado === 'pendiente');
        $('lAdm').innerHTML = vPend.length ? vPend.map(v => `
            <div class="card p-2 text-xs">
                <div class="flex justify-between items-center">
                    <b>${v.dias} días hábiles</b>
                    ${bdg(v.estado)}
                </div>
                <p class="text-muted mt-1">${(users[v.uid] || {}).nombre || v.uid}</p>
                <p class="text-muted">${fdt(v.fechaInicio)} → ${fdt(v.fechaFin)}</p>
                <button onclick="chg('vacacion','${v.id}','aprobado')" class="mt-2 text-xs bg-info/20 text-info px-2 py-1 rounded w-full">✓ Aprobar</button>
            </div>
        `).join('') : '<p class="text-center text-muted text-xs p-2">Nada pendiente</p>';
    }

    // ─── ADMIN DETALLE USUARIO ───────────────────────────────────────────────
    function renderAdminDetail(uid) {
        const user   = (d.usuarios || {})[uid] || {nombre: uid};
        const vList  = d.viaticos.filter(x => x.uid === uid);
        const rList  = d.reembolsos.filter(x => x.uid === uid);
        const vacList = d.vacaciones.filter(x => x.uid === uid);

        const rPend  = rList.filter(x => x.estado === 'pendiente');
        const rPagado = rList.filter(x => x.estado === 'pagado');
        const totalDeuda = rPend.reduce((s, x) => s + (x.monto || 0), 0);

        $('adminContent').innerHTML = `
            <button onclick="clearSelectedUser()" class="mb-4 text-accent text-sm flex items-center gap-1">← Todos los usuarios</button>

            <div class="card p-3 mb-3 border-l-4 border-accent">
                <h3 class="font-bold">${user.nombre}</h3>
                <p class="text-xs text-muted">${uid}</p>
                ${totalDeuda > 0 ? `<p class="text-xs text-warning mt-1">Deuda pendiente: ${fmt(totalDeuda)}</p>` : ''}
            </div>

            <!-- Viáticos -->
            <div class="card p-3 mb-3">
                <p class="text-muted text-xs mb-2">Viáticos (${vList.length})</p>
                ${vList.length ? vList.map(v => `
                    <div class="flex justify-between items-start py-1 border-b border-border text-xs">
                        <div>
                            <p class="font-bold">${v.concepto}</p>
                            <p class="text-muted">${v.evento || 'Sin evento'} · ${fdt(v.fecha)}</p>
                            ${v.foto ? `<a href="${v.foto}" target="_blank" class="text-info underline">Ver comprobante</a>` : ''}
                        </div>
                        <b class="text-accent ml-2">${fmt(v.monto)}</b>
                    </div>
                `).join('') : '<p class="text-xs text-muted">Sin registros</p>'}
            </div>

            <!-- Reembolsos pendientes -->
            <div class="card p-3 mb-3">
                <p class="text-muted text-xs mb-2">Reembolsos pendientes</p>
                ${rPend.length ? rPend.map(r => `
                    <div class="card p-2 mb-2 text-xs">
                        <div class="flex justify-between">
                            <b>${r.concepto}</b>
                            <b class="text-warning">${fmt(r.monto)}</b>
                        </div>
                        <p class="text-muted">${fdt(r.fecha)}</p>
                        ${r.foto ? `<a href="${r.foto}" target="_blank" class="text-info underline">Ver comprobante</a>` : '<span class="text-muted opacity-50">Sin comprobante</span>'}
                        <button onclick="chg('reembolso','${r.id}','pagado')" class="mt-2 w-full bg-accent/20 text-accent rounded py-1 font-bold">✓ Registrar pago</button>
                    </div>
                `).join('') : '<p class="text-xs text-muted">Sin pendientes</p>'}
            </div>

            <!-- Historial de reembolsos pagados -->
            ${rPagado.length ? `
            <div class="card p-3 mb-3">
                <p class="text-muted text-xs mb-2">Reembolsos pagados</p>
                ${rPagado.map(r => `
                    <div class="card p-2 mb-1 text-xs opacity-70">
                        <div class="flex justify-between">
                            <b>${r.concepto}</b>
                            <b class="text-accent">${fmt(r.monto)}</b>
                        </div>
                        <p class="text-muted">Pagado: ${fdt(r.fechaPago)}</p>
                    </div>
                `).join('')}
            </div>` : ''}

            <!-- Vacaciones -->
            <div class="card p-3">
                <p class="text-muted text-xs mb-2">Vacaciones</p>
                ${vacList.length ? vacList.map(v => `
                    <div class="card p-2 mb-2 text-xs">
                        <div class="flex justify-between items-center">
                            <b>${v.dias} días hábiles</b>
                            ${bdg(v.estado)}
                        </div>
                        <p class="text-muted">${fdt(v.fechaInicio)} → ${fdt(v.fechaFin)}</p>
                        ${v.estado === 'pendiente' ? `<button onclick="chg('vacacion','${v.id}','aprobado')" class="mt-2 w-full bg-info/20 text-info rounded py-1">✓ Aprobar</button>` : ''}
                    </div>
                `).join('') : '<p class="text-xs text-muted">Sin registros</p>'}
            </div>
        `;
    }

    window.selectUser     = id => { selectedUser = id; render(); };
    window.clearSelectedUser = () => { selectedUser = null; render(); };

    // ─── CARGAR DATOS ────────────────────────────────────────────────────────
    async function load() {
        const res = await api(u.isAdmin ? 'getAdminDatos' : 'getDatos', {email: u.email});
        if (res.viaticos)   d.viaticos   = res.viaticos;
        if (res.reembolsos) d.reembolsos = res.reembolsos;
        if (res.vacaciones) d.vacaciones = res.vacaciones;
        if (res.usuarios)   d.usuarios   = res.usuarios;
        render();
    }

    // ─── CAMBIAR ESTADO ──────────────────────────────────────────────────────
    window.chg = async (tipo, id, nuevo) => {
        if (!confirm('¿Confirmar acción?')) return;
        const res = await api('cambiarEstatus', {tipo, id, nuevo, email: u.email});
        if (res.ok) load();
        else alert('Error: ' + res.error);
    };

    // ─── MODALES ─────────────────────────────────────────────────────────────
    function openModal(t) {
        let h = '';
        if (t === 'via') {
            $('mTit').innerText = "Viático";
            h = `<form onsubmit="sv('via',event)" class="space-y-2">
                <input name="fecha" type="date" required>
                <input name="evento" placeholder="Evento" required>
                <input name="concepto" placeholder="Concepto" required>
                <input name="monto" type="number" step="0.01" placeholder="Monto" required>
                <div>
                    <p class="text-xs text-muted mb-1">Comprobante (opcional)</p>
                    <input type="file" id="fileVia" accept="image/*,application/pdf" class="text-xs">
                </div>
                <button class="w-full p-2 bg-accent text-bg rounded font-bold">Guardar</button>
            </form>`;
        }
        if (t === 'ree') {
            $('mTit').innerText = "Reembolso";
            h = `<form onsubmit="sv('ree',event)" class="space-y-2">
                <input name="fecha" type="date" required>
                <input name="evento" placeholder="Evento" required>
                <input name="concepto" placeholder="Concepto" required>
                <input name="monto" type="number" step="0.01" placeholder="Monto" required>
                <div>
                    <p class="text-xs text-muted mb-1">Comprobante (opcional)</p>
                    <input type="file" id="fileRee" accept="image/*,application/pdf" class="text-xs">
                </div>
                <button class="w-full p-2 bg-warning text-bg rounded font-bold">Guardar</button>
            </form>`;
        }
        if (t === 'vac') {
            $('mTit').innerText = "Solicitar Vacaciones";
            h = `<form onsubmit="sv('vac',event)" class="space-y-2">
                <label class="text-xs text-muted">Fecha inicio</label>
                <input name="fi" type="date" required>
                <label class="text-xs text-muted">Fecha fin</label>
                <input name="ff" type="date" required>
                <p id="diasCalc" class="text-xs text-info"></p>
                <button class="w-full p-2 bg-info text-bg rounded font-bold">Solicitar</button>
            </form>`;
            setTimeout(() => {
                const fi = document.querySelector('[name=fi]');
                const ff = document.querySelector('[name=ff]');
                const upd = () => {
                    if (fi.value && ff.value) {
                        const n = calcDias(fi.value, ff.value);
                        $('diasCalc').innerText = n > 0 ? `${n} días hábiles (sin domingos)` : 'Rango inválido';
                    }
                };
                fi.addEventListener('change', upd);
                ff.addEventListener('change', upd);
            }, 100);
        }
        if (t === 'usr') {
            $('mTit').innerText = "Nuevo Usuario";
            h = `<form onsubmit="sv('usr',event)" class="space-y-2">
                <input name="nombre" placeholder="Nombre completo" required>
                <input name="email" type="email" placeholder="Correo (será su usuario)" required>
                <select name="rol">
                    <option value="false">Empleado</option>
                    <option value="true">Admin</option>
                </select>
                <input name="dias" type="number" placeholder="Días de vacaciones" value="15">
                <button class="w-full p-2 bg-purple-500 text-white rounded font-bold">Guardar</button>
            </form>`;
        }
        $('mBod').innerHTML = h;
        $('mod').classList.remove('hidden');
    }

    // ─── GUARDAR FORMULARIOS ─────────────────────────────────────────────────
    window.sv = async (t, e) => {
        e.preventDefault();
        const f = e.target;
        let o = {uid: u.email};
        let res;

        if (t === 'via') {
            o.fecha    = f.fecha.value;
            o.evento   = f.evento.value;
            o.concepto = f.concepto.value;
            o.monto    = parseFloat(f.monto.value);
            o.tipo     = 'Gasto';
            o.metodo   = 'Efectivo';
            const fv = document.getElementById('fileVia');
            if (fv && fv.files[0]) {
                const file = fv.files[0];
                o.archivoBase64 = await new Promise(r => {
                    const reader = new FileReader();
                    reader.onload = ev => r(ev.target.result.split(',')[1]);
                    reader.readAsDataURL(file);
                });
                o.archivoNombre = file.name;
                o.archivoTipo   = file.type;
            }
            res = await api('guardarViatico', {datos: JSON.stringify(o)});
        }

        if (t === 'ree') {
            o.fecha    = f.fecha.value;
            o.evento   = f.evento.value;
            o.concepto = f.concepto.value;
            o.monto    = parseFloat(f.monto.value);
            o.tipoComp = 'Ticket';
            o.estado   = 'pendiente';
            const fr = document.getElementById('fileRee');
            if (fr && fr.files[0]) {
                const file = fr.files[0];
                o.archivoBase64 = await new Promise(r => {
                    const reader = new FileReader();
                    reader.onload = ev => r(ev.target.result.split(',')[1]);
                    reader.readAsDataURL(file);
                });
                o.archivoNombre = file.name;
                o.archivoTipo   = file.type;
            }
            res = await api('guardarReembolso', {datos: JSON.stringify(o)});
        }

        if (t === 'vac') {
            o.fechaInicio = f.fi.value;
            o.fechaFin    = f.ff.value;
            o.dias        = calcDias(f.fi.value, f.ff.value);
            o.estado      = 'pendiente';
            if (o.dias <= 0) { alert('Rango de fechas inválido'); return; }
            res = await api('guardarVacacion', {datos: JSON.stringify(o)});
        }

        if (t === 'usr') {
            o.nombre  = f.nombre.value;
            o.email   = f.email.value;
            o.isAdmin = f.rol.value === 'true';
            o.diasVac = parseInt(f.dias.value) || 15;
            res = await api('guardarUsuario', {datos: JSON.stringify(o), email: u.email});
        }

        if (res && res.ok) {
            $('mod').classList.add('hidden');
            load();
        } else {
            alert('Error: ' + (res ? res.error : 'Sin respuesta'));
        }
    };

    // ─── LOGIN ────────────────────────────────────────────────────────────────
    $('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        $('err').style.display='none';
        const res = await api('login', {email: $('userInput').value});
        if (res.ok) {
            const exp = res.usuario.nombre.toLowerCase().replace(/ /g, '') + '68';
            if ($('passInput').value.toLowerCase() === exp) {
                u = res.usuario;
                $('loginScreen').style.display='none';
                $('mainApp').style.display='block';
                $('uname').innerText = u.nombre;
                if (u.isAdmin) {
                    $('navAdm').classList.remove('hidden');
                    $('navAdm').classList.add('admin-visible');
                }
                load();
            } else {
                $('err').innerText = 'Contraseña incorrecta';
                $('err').style.display='block';
            }
        } else {
            $('err').innerText = res.error || 'Error al iniciar sesión';
            $('err').style.display='block';
        }
    };

    // ─── NAVEGACIÓN ──────────────────────────────────────────────────────────
    document.querySelectorAll('.nav').forEach(n => n.onclick = function() {
        if (selectedUser && this.dataset.s !== 'sAdm') selectedUser = null;
        document.querySelectorAll('.nav').forEach(x => x.classList.remove('active'));
        this.classList.add('active');
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        $(this.dataset.s).classList.add('active');
        const titles = {sVia:'Viáticos', sRee:'Reembolsos', sVac:'Vacaciones', sAdm:'Admin'};
        $('htitle').innerText = titles[this.dataset.s];
        render();
    });

    $('logout').onclick = () => { u = null; d = {viaticos:[], reembolsos:[], vacaciones:[], usuarios:{}}; location.reload(); };
    </script>

<script>
// ── OVERRIDE RENDERS ──────────────────────────────────────────────────────────

      </div>
    `).join('')}

renderVacaciones = function() {
  let lista = d.vacaciones.filter(x => x.uid === u.email);
  let usados = 0;
  lista.forEach(x=>{ if(x.estado==='aprobado') usados+=(parseInt(x.dias)||0); });
  const diasBase = (d.usuarios&&d.usuarios[u.email]&&d.usuarios[u.email].diasVac) ? parseInt(d.usuarios[u.email].diasVac) : 15;
  $('tVac').innerText = Math.max(0, diasBase - usados);
  let pendDias = 0;
  lista.forEach(x=>{ if(x.estado==='pendiente') pendDias+=(parseInt(x.dias)||0); });
  $('vacPendientes').innerText = pendDias > 0 ? `${pendDias} días en espera de aprobación` : '';
  $('lVac').innerHTML = lista.length ? lista.map(v=>`
    <div class="list-item">
      <div class="item-row">
        <div><div class="item-name">${v.dias} días hábiles</div><div class="item-sub">${fdt(v.fechaInicio)} → ${fdt(v.fechaFin)}</div></div>
        ${bdg(v.estado)}

  `).join('') : '<div class="empty">Sin solicitudes</div>';
};

  }
  if (t==='vac') {
    $('mTit').innerText='Solicitar Vacaciones';
    h=`<div class="form-group"><label class="form-label">Fecha inicio</label><input type="date" name="fi" class="form-input" required id="vacFi"></div>
       <div class="form-group"><label class="form-label">Fecha fin</label><input type="date" name="ff" class="form-input" required id="vacFf"></div>

       <button type="button" onclick="sv('vac',this.closest('.modal-box'))" class="btn-red" style="margin-top:12px">SOLICITAR</button>`;
    setTimeout(()=>{
      const fi=$('vacFi'), ff=$('vacFf'), prev=$('daysPreview');
      const upd=()=>{ if(fi.value&&ff.value){ const n=calcDias(fi.value,ff.value); prev.innerText=n>0?`${n} días hábiles (sin domingos)`:'Rango inválido'; } };

  if (t==='usr') {

       <div class="form-group"><label class="form-label">Días de vacaciones</label><input type="number" name="dias" class="form-input" value="15"></div>
       <button type="button" onclick="sv('usr',this.closest('.modal-box'))" class="btn-red" style="margin-top:8px">GUARDAR</button>`;
  }
  $('mBod').innerHTML = h;
  $('mod').classList.add('open');
};

// ── SV OVERRIDE ──────────────────────────────────────────────────────────────
window.sv = async function(t, box) {
  const getName = n => box.querySelector(`[name="${n}"]`)?.value || '';
  let o = {uid: u.email}, res;

  if(t==='via'){
    o.fecha=getName('fecha'); o.evento=getName('evento'); o.concepto=getName('concepto');
    o.monto=parseFloat(getName('monto')); o.tipo='Gasto'; o.metodo='Efectivo';
    const fv=$('fileVia');
    if(fv&&fv.files[0]){ const f=fv.files[0]; o.archivoBase64=await new Promise(r=>{const rd=new FileReader();rd.onload=e=>r(e.target.result.split(',')[1]);rd.readAsDataURL(f);}); o.archivoNombre=f.name; o.archivoTipo=f.type; }
    res=await api('guardarViatico',{datos:JSON.stringify(o)});
  }
  if(t==='ree'){
    o.fecha=getName('fecha'); o.evento=getName('evento'); o.concepto=getName('concepto');
    o.monto=parseFloat(getName('monto')); o.tipoComp='Ticket'; o.estado='pendiente';
    const fr=$('fileRee');
    if(fr&&fr.files[0]){ const f=fr.files[0]; o.archivoBase64=await new Promise(r=>{const rd=new FileReader();rd.onload=e=>r(e.target.result.split(',')[1]);rd.readAsDataURL(f);}); o.archivoNombre=f.name; o.archivoTipo=f.type; }
    res=await api('guardarReembolso',{datos:JSON.stringify(o)});
  }
  if(t==='vac'){
    o.fechaInicio=getName('fi'); o.fechaFin=getName('ff');
    o.dias=calcDias(o.fechaInicio,o.fechaFin); o.estado='pendiente';
    if(o.dias<=0){alert('Rango de fechas inválido');return;}
    res=await api('guardarVacacion',{datos:JSON.stringify(o)});
  }
  if(t==='usr'){
    o.nombre=getName('nombre'); o.email=getName('email');
    o.isAdmin=getName('rol')==='true'; o.diasVac=parseInt(getName('dias'))||15;
    res=await api('guardarUsuario',{datos:JSON.stringify(o),email:u.email});
  }
  if(res&&res.ok){ closeModal(); load(); }
  else alert('Error: '+(res?res.error:'Sin respuesta'));
};

// ── LOGIN OVERRIDE ────────────────────────────────────────────────────────────
$('loginForm').onsubmit = async function(e) {
  e.preventDefault();
  const err = $('loginErr');
  err.style.display = 'none';
  const res = await api('login', {email: $('userInput').value});
  if (res.ok) {
    const exp = res.usuario.nombre.toLowerCase().replace(/ /g,'') + '68';
    if ($('passInput').value.toLowerCase() === exp) {
      u = res.usuario;
      $('loginScreen').style.display = 'none';
      $('mainApp').style.display = 'block';
      $('uname').innerText = u.nombre;
      if (u.isAdmin) { $('navAdm').style.display = 'flex'; }
      load();
    } else { err.innerText = 'Contraseña incorrecta'; err.style.display = 'block'; }
  } else { err.innerText = res.error||'Error al iniciar sesión'; err.style.display = 'block'; }
};

// ── NAV OVERRIDE ──────────────────────────────────────────────────────────────
document.querySelectorAll('.nav-tab').forEach(n => n.onclick = function() {
  if (selectedUser && this.dataset.s !== 'sAdm') selectedUser = null;
  document.querySelectorAll('.nav-tab').forEach(x => x.classList.remove('active'));
  this.classList.add('active');
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  $(this.dataset.s).classList.add('active');
  $('htitle').innerText = this.dataset.t;
  render();
});

$('logout').onclick = () => { u=null; d={viaticos:[],reembolsos:[],vacaciones:[],usuarios:{}}; location.reload(); };
